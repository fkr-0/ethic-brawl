version: 1
name: ethic-brawl
description: Ethic Brawl development commands
agent:
  notes: Canvas2D remains the authoritative renderer. The vendored arcade-pixi-runtime v0.6 contract, lazy PixiJS bridge, and dependency-injected adapters are the supported incremental migration seam. Keep the Canvas fallback and do not introduce a source-level dependency on badger-sprawl-runner.
  tasks:
    - Keep production deployment subpath-safe at /ethic-brawl/.
    - Keep Stage 1 E2E coverage green.
  changelog:
    - 2026-07-14: Production subpath deployment and Stage 1 vertical slice repaired and enhanced.
    - 2026-07-14: Added renderer-neutral stage profiles, pooled combat VFX, and Badger-inspired parallax/foreground layers.
    - 2026-07-19: Added the verified shared-runtime v0.6 lifecycle, deterministic ordering, context recovery, one-texture stage bridge, and renderer performance route.
commands:
  lint:
    run: ["pnpm", "lint"]
    category: lint
  typecheck:
    run: ["pnpm", "typecheck"]
    category: test
  test:
    run: ["pnpm", "test:run"]
    category: test
  e2e:
    run: ["pnpm", "test:e2e"]
    timeoutMs: 60000
    category: test
  release-check:
    run: ["pnpm", "release:check"]
    timeoutMs: 120000
    category: test
