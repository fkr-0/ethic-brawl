<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ethic Brawl - A 2.5D cyberpunk philosophical arena-brawler" />
    <title>Ethic Brawl</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1A0A2E;
      }
      
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      #game-canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #1A0A2E;
        color: #00F5FF;
        font-family: 'Courier New', monospace;
        font-size: 24px;
        z-index: 1000;
      }
      
      #loading.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">INITIALIZING ETHIC BRAWL...</div>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
