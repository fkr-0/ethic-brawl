version: 2
character_id: bakunin
title: Mikhail Bakunin
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Mikhail Bakunin.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Mikhail Bakunin — The Black-Flag Firebrand; role: explosive rushdown; mechanic: bombs, firestorm, armor break.

  Biography/combat fantasy: Anarchist revolutionary recast as explosive rushdown: wild beard, black flag, bombs, molotov trails, and reckless
  forward momentum. Bakunin breaks armor and authority by getting close before the opponent can organize.

  Appearance: wild hair and beard, black revolutionary coat, red-black scarf, heavy boots, black flag strip, round bomb or molotov bottle, ember
  sparks and smoke.

  Palette: coat black #141218, flag black #050507, anarch red #D21F2B, fire orange #FF7A1A, bomb iron #4B4F55, smoke gray #858078.

  Animation identity: volatile bouncing idle, charging walk, explosive forward run, reckless leap, crossed bomb-arm block, black-flag victory
  shout.

  Normals: Riot Jab: short brawling punch, red ember snap, rush opener; Authority Breaker: overhand coat-swing smash, orange armor-crack flash,
  guard pressure; Black-Flag Kick: forward boot kick with flag trail, smoke-orange hit spark, heavy ender

  Specials: B>A Anarch Bomb: startup pulls a small round bomb from coat, active quick bomb toss with short fuse, impact contained orange blast
  puff, recovery leans into next rush; BvA Molotov Groundfire: startup crouches with bottle and flame, active slashes bottle low across floor,
  impact short orange fire strip ignites, recovery steps through smoke; B>J Insurrection Dash: startup front boot digs in, flag strip snaps back,
  active explosive forward dash shoulder-first, impact red-orange burst at leading foot, recovery skids still aggressive; BvJ No-Masters Firestorm:
  startup raises black flag and bomb spark, active vertical contained firestorm blooms around him, impact embers spiral without hiding body, recovery
  flag smoke collapses into stance'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'coat black #141218, flag black #050507, anarch red #D21F2B, fire orange #FF7A1A, bomb iron #4B4F55, smoke gray #858078'
appearance_bible: wild hair and beard, black revolutionary coat, red-black scarf, heavy boots, black flag strip, round bomb or molotov bottle,
  ember sparks and smoke
animation_bible: volatile bouncing idle, charging walk, explosive forward run, reckless leap, crossed bomb-arm block, black-flag victory shout
