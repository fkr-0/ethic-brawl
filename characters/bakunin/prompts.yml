grids:
- id: bakunin_grid01_movement
  output: characters/bakunin/sprites/bakunin_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: volatile bouncing idle, charging walk, explosive forward run, reckless leap, crossed bomb-arm block, black-flag
    victory shout. 2 idle B tiny alternate breath/weight shift. 3 light hurt contained recoil. 4 heavy hurt stronger recoil but identity intact.
    5-8 walk cycle with four distinct foot phases and prop/costume lag. 9-12 run cycle: acceleration, longest stride, pass step, push-off. 13
    vertical jump takeoff. 14 jump in air. 15 running jump arc. 16 K.O. full body visible. Keep prop/costume readable in every frame; no duplicate
    silhouettes; no cross-cell trails.'
- id: bakunin_grid02_fighting
  output: characters/bakunin/sprites/bakunin_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Riot Jab startup: short brawling punch. 2 Riot Jab impact: red ember snap. 3 recovery. 4 Authority Breaker running startup:
    overhand coat-swing smash. 5 impact: orange armor-crack flash. 6 slide/recovery. 7 aerial/running startup for Black-Flag Kick. 8 aerial impact:
    forward boot kick with flag trail, smoke-orange hit spark. 9 landing recovery. 10 running evasion/block start. 11 character-specific guarded
    block. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must show
    anticipation, active, recovery.'
- id: bakunin_grid03_throws_consumes_swings
  output: characters/bakunin/sprites/bakunin_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: bomb/marble fuse / molotov swig-light use / flag-and-fist swing. 2 throw windup.
    3 throw release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup. 10 swing
    impact. 11 swing follow-through. 12 reset. 13 B>A Anarch Bomb keypose: quick bomb toss with short fuse / contained orange blast puff. 14 BvA
    Molotov Groundfire keypose: slashes bottle low across floor / short orange fire strip ignites. 15 B>J Insurrection Dash keypose: explosive
    forward dash shoulder-first / red-orange burst at leading foot. 16 BvJ No-Masters Firestorm keypose: vertical contained firestorm blooms around
    him / embers spiral without hiding body. Compact VFX only; caster silhouette first.'
- id: bakunin_grid04_specials
  output: characters/bakunin/sprites/bakunin_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Anarch Bomb, B>A: 1 startup pulls a small round bomb from coat; 2 active quick bomb toss with short fuse; 3 impact/sustain contained
    orange blast puff; 4 recovery leans into next rush.

    Row 2, Molotov Groundfire, BvA: 5 startup crouches with bottle and flame; 6 active slashes bottle low across floor; 7 impact/sustain short
    orange fire strip ignites; 8 recovery steps through smoke.

    Row 3, Insurrection Dash, B>J: 9 startup front boot digs in, flag strip snaps back; 10 active explosive forward dash shoulder-first; 11 impact/sustain
    red-orange burst at leading foot; 12 recovery skids still aggressive.

    Row 4, No-Masters Firestorm, BvJ: 13 startup raises black flag and bomb spark; 14 active vertical contained firestorm blooms around him; 15
    impact/sustain embers spiral without hiding body; 16 recovery flag smoke collapses into stance.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: wild hair and beard, black revolutionary coat, red-black scarf, heavy boots, black flag strip, round bomb or molotov bottle,
      ember sparks and smoke
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: bombs, firestorm, armor break; VFX must stay behind or around the silhouette unless it is the
      impact frame'
  palette_budget:
    primary: '#141218'
    secondary: '#050507'
    accent: '#D21F2B'
    vfx_1: '#FF7A1A'
    vfx_2: '#4B4F55'
    shadow: '#858078'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Mikhail Bakunin as explosive rushdown through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Riot Jab: startup, impact, recovery'
      4-6: 'running Authority Breaker: run transition, impact, slide/recover'
      7-9: 'aerial/running Black-Flag Kick: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Anarch Bomb keypose
      '14': BvA Molotov Groundfire keypose
      '15': B>J Insurrection Dash keypose
      '16': BvJ No-Masters Firestorm keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize bombs, firestorm, armor break
    rows:
      row1_frames_1_4: 'B>A Anarch Bomb: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'BvA Molotov Groundfire: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B>J Insurrection Dash: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ No-Masters Firestorm: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
