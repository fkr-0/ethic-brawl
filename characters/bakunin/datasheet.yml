id: bakunin
title: Mikhail Bakunin
subtitle: The Black-Flag Firebrand
role: explosive rushdown
element_mechanic: bombs, firestorm, armor break
source_notes:
- prompt-first with roster placeholder source sheet
full_biography:
  summary: 'Anarchist revolutionary recast as explosive rushdown: wild beard, black flag, bombs, molotov trails, and reckless forward momentum.
    Bakunin breaks armor and authority by getting close before the opponent can organize.'
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 7
    strength: 8
    agility: 7
    vitality: 6
    energy: 8
appearance_bible:
  appearance: wild hair and beard, black revolutionary coat, red-black scarf, heavy boots, black flag strip, round bomb or molotov bottle, ember
    sparks and smoke
  palette: 'coat black #141218, flag black #050507, anarch red #D21F2B, fire orange #FF7A1A, bomb iron #4B4F55, smoke gray #858078'
  motion: volatile bouncing idle, charging walk, explosive forward run, reckless leap, crossed bomb-arm block, black-flag victory shout
  items: bomb/marble fuse / molotov swig-light use / flag-and-fist swing
move_render_descriptions:
  normal_moves:
  - name: Riot Jab
    pose: short brawling punch
    vfx: red ember snap
    gameplay: rush opener
  - name: Authority Breaker
    pose: overhand coat-swing smash
    vfx: orange armor-crack flash
    gameplay: guard pressure
  - name: Black-Flag Kick
    pose: forward boot kick with flag trail
    vfx: smoke-orange hit spark
    gameplay: heavy ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Anarch Bomb
    startup: pulls a small round bomb from coat
    active: quick bomb toss with short fuse
    impact: contained orange blast puff
    recovery: leans into next rush
  - command: BvA
    commandSlot: BDA
    name: Molotov Groundfire
    startup: crouches with bottle and flame
    active: slashes bottle low across floor
    impact: short orange fire strip ignites
    recovery: steps through smoke
  - command: B>J
    commandSlot: BFJ
    name: Insurrection Dash
    startup: front boot digs in, flag strip snaps back
    active: explosive forward dash shoulder-first
    impact: red-orange burst at leading foot
    recovery: skids still aggressive
  - command: BvJ
    commandSlot: BDJ
    name: No-Masters Firestorm
    startup: raises black flag and bomb spark
    active: vertical contained firestorm blooms around him
    impact: embers spiral without hiding body
    recovery: flag smoke collapses into stance
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
