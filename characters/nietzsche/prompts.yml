version: 2
character_id: nietzsche
title: Friedrich Nietzsche
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for image-rendering LLMs.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Friedrich Nietzsche.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom.

  Every cell must be the same size, perfectly aligned, with no gutters, no margins, no border, no labels, no text.

  Use true alpha transparency. Keep the same character identity, costume, palette, scale, camera angle, lighting, and pixel density in all 16
  cells.

  Right-facing side-view fighter poses unless a frame explicitly says left-facing recovery. Keep the full body inside every cell.

  Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Prioritize body pose clarity over large magical effects.'
character_sprite_brief: 'Friedrich Nietzsche — The Abyssal Bruiser; role: high-risk bruiser.

  Biography: German philosopher of critique, aphorism, eternal recurrence, the abyss, self-overcoming, and will to power recast as a stormy hammer
  bruiser. He fights as dangerous becoming: risk first, proof after impact.

  Appearance: wild unmistakable moustache, intense eyes, swept hair, dark nineteenth-century coat, high collar, boots, compact philosopher hammer,
  storm-lit edges.

  Palette: dark coat #1B1A20, moustache #4A2B19, hammer steel #80858A, abyss violet #3B235A, storm gold #F0C13B, fire orange #D85A24.

  Animation identity: coiled hammer idle, swaggering walk, reckless forward run, aggressive hammer jump, abyss-ring block, dramatic but defiant
  hurt.

  Normals: Hammer Aphorism: short low hammer snap, tiny gold crack, fast bruiser opener; Eternal Return Counter: torso curls around hammer, violet
  abyss loop, risky counter beat; Overman Rush: reckless shoulder-hammer drive, gold lightning and orange sparks, committal heavy rush

  Specials: B>A Hammer Aphorism: startup hammer drawn back low, active forward smash sends ground crack, impact storm-gold crack orange edge,
  recovery hammer rebounds; B<A Eternal Return Counter: startup leans into danger, active violet abyss ring around hammer, impact ring snaps outward,
  recovery defiant twist; B>J Overman Rush: startup boots dig in coat lifts, active storm-lit hammer dash, impact gold lightning at shoulder,
  recovery skids exposed; BvJ Will-to-Power Storm: startup raises hammer abyss opens, active contained fire-lightning column, impact jagged arcs
  within cell, recovery storm collapses'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters, busy background, non-transparent
  background, checkerboard background, text, letters, labels, captions, speech bubbles, UI elements, watermark, logo, uneven grid, broken grid,
  offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion trails crossing cell boundaries, duplicate frames, heavy glow, bloom,
  soft shadow halos, anti-aliased fringe, costume changes, face changes, weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'dark coat #1B1A20, moustache #4A2B19, hammer steel #80858A, abyss violet #3B235A, storm gold #F0C13B, fire orange #D85A24'
appearance_bible: wild unmistakable moustache, intense eyes, swept hair, dark nineteenth-century coat, high collar, boots, compact philosopher
  hammer, storm-lit edges
animation_bible: coiled hammer idle, swaggering walk, reckless forward run, aggressive hammer jump, abyss-ring block, dramatic but defiant hurt
move_render_descriptions:
  normal_moves:
  - name: Hammer Aphorism
    pose: short low hammer snap
    vfx: tiny gold crack
    gameplay: fast bruiser opener
  - name: Eternal Return Counter
    pose: torso curls around hammer
    vfx: violet abyss loop
    gameplay: risky counter beat
  - name: Overman Rush
    pose: reckless shoulder-hammer drive
    vfx: gold lightning and orange sparks
    gameplay: committal heavy rush
