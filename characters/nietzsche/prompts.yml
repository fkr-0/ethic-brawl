grids:
- id: nietzsche_grid01_movement
  output: characters/nietzsche/sprites/nietzsche_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: coiled hammer idle, swaggering walk, reckless forward run, aggressive hammer jump, abyss-ring block, dramatic
    but defiant hurt. 2 idle B: tiny alternate breath. 3 light hurt, contained recoil. 4 heavy hurt, stronger recoil but identity intact. 5-8
    walk cycle: coiled hammer idle, swaggering walk, reckless forward run, aggressive hammer jump, abyss-ring block, dramatic but defiant hurt
    with four distinct foot phases. 9-12 run cycle: role-specific acceleration, longest stride, pass step, push-off. 13 jump takeoff. 14 jump
    air. 15 running jump. 16 K.O. full body visible. Keep prop/costume readable in every frame; no duplicate silhouettes.'
- id: nietzsche_grid02_fighting
  output: characters/nietzsche/sprites/nietzsche_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Hammer Aphorism startup: short low hammer snap. 2 Hammer Aphorism impact: tiny gold crack. 3 recovery. 4 Eternal Return
    Counter running startup: torso curls around hammer. 5 impact: violet abyss loop. 6 recovery. 7 aerial/running attack startup for Overman Rush.
    8 impact: reckless shoulder-hammer drive, gold lightning and orange sparks. 9 landing recovery. 10 running evasion start. 11 guarded block
    using character identity. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame
    clip must show anticipation, active, recovery.'
- id: nietzsche_grid03_throws_consumes_swings
  output: characters/nietzsche/sprites/nietzsche_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: aphorism shard / tosses scrap into fire spark / hammer arc with storm crack. 2 throw
    windup. 3 throw release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup.
    10 swing impact. 11 swing follow-through. 12 reset. 13 B>A Hammer Aphorism keypose: forward smash sends ground crack / storm-gold crack orange
    edge. 14 B<A Eternal Return Counter keypose: violet abyss ring around hammer / ring snaps outward. 15 B>J Overman Rush keypose: storm-lit
    hammer dash / gold lightning at shoulder. 16 BvJ Will-to-Power Storm keypose: contained fire-lightning column / jagged arcs within cell. Compact
    VFX only; caster silhouette first.'
- id: nietzsche_grid04_specials
  output: characters/nietzsche/sprites/nietzsche_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Hammer Aphorism, B>A: 1 startup hammer drawn back low; 2 active forward smash sends ground crack; 3 impact/sustain storm-gold crack
    orange edge; 4 recovery hammer rebounds.

    Row 2, Eternal Return Counter, B<A: 5 startup leans into danger; 6 active violet abyss ring around hammer; 7 impact/sustain ring snaps outward;
    8 recovery defiant twist.

    Row 3, Overman Rush, B>J: 9 startup boots dig in coat lifts; 10 active storm-lit hammer dash; 11 impact/sustain gold lightning at shoulder;
    12 recovery skids exposed.

    Row 4, Will-to-Power Storm, BvJ: 13 startup raises hammer abyss opens; 14 active contained fire-lightning column; 15 impact/sustain jagged
    arcs within cell; 16 recovery storm collapses.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: wild unmistakable moustache, intense eyes, swept hair, dark nineteenth-century coat, high collar, boots, compact philosopher
      hammer, storm-lit edges
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: high-risk bruiser using hammer, abyss, lightning/fire storm.; VFX must stay behind or around
      the silhouette unless it is the impact frame'
  palette_budget:
    primary: '#1B1A20'
    secondary: '#4A2B19'
    accent: '#80858A'
    vfx_1: '#3B235A'
    vfx_2: '#F0C13B'
    shadow: '#D85A24'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Friedrich Nietzsche as high-risk bruiser through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Hammer Aphorism: startup, impact, recovery'
      4-6: 'running Eternal Return Counter: run transition, impact, slide/recover'
      7-9: 'aerial/running Overman Rush: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Hammer Aphorism keypose
      '14': B<A Eternal Return Counter keypose
      '15': B>J Overman Rush keypose
      '16': BvJ Will-to-Power Storm keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize high-risk bruiser using hammer, abyss, lightning/fire storm.
    rows:
      row1_frames_1_4: 'B>A Hammer Aphorism: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Eternal Return Counter: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B>J Overman Rush: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Will-to-Power Storm: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
