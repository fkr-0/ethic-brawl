production_checklist:
  asset_files_expected:
  - characters/nietzsche/sprites/nietzsche_grid01_movement.png
  - characters/nietzsche/sprites/nietzsche_grid02_fighting.png
  - characters/nietzsche/sprites/nietzsche_grid03_throws_consumes_swings.png
  - characters/nietzsche/sprites/nietzsche_grid04_specials.png
  validation:
  - image dimensions divisible by 4 in both axes
  - alpha background present and not replaced by checkerboard
