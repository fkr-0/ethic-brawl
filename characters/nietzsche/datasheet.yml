grid_prompt_contract:
  cell_count: 16
  arrangement: exact 4x4 grid, left-to-right, top-to-bottom
  output_constraints:
  - one sheet image only
  - identical cell sizes
  - no gutters, no margins, no borders
  - true alpha transparent background
  - consistent scale, camera, lighting, palette, line thickness
  - character fully inside each cell
  - right-facing unless a frame explicitly states left-facing recovery
  - no text or labels
  negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters, busy background, non-transparent
    background, checkerboard background, text, labels, speech bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent
    cell sizes, cropped limbs, cut-off feet, motion trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased
    fringe, costume changes, face changes
