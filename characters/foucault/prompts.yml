version: 2
character_id: foucault
title: Michel Foucault
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Michel Foucault.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Michel Foucault — The Panopticon Archivist; role: control zoner; mechanic: beams, grids, reveal/silence.

  Biography/combat fantasy: Historian of power, discipline, clinics, prisons, sexuality, and discourse recast as a control zoner who turns the
  arena into an archive of visible bodies. He does not overpower opponents; he frames them, reveals them, silences their options, and lets the
  grid do the punishment.

  Appearance: bald head, round glasses, severe eyes, black turtleneck and long academic coat, narrow trousers, gloved or ink-stained hands, file-folder
  or archive cards, thin surveillance grid VFX.

  Palette: black coat #101114, clinic white #DDE6E8, archive paper #C9B88A, panopticon teal #39C5BB, surveillance blue #4A7DFF, warning red #C23B3B.

  Animation identity: still analytical idle, clipped institutional walk, sliding grid-step run, compact vertical jump, forearm-plus-grid block,
  cold reveal gesture victory.

  Normals: Disciplinary Tap: short baton-like finger or folder jab, tiny teal grid tick, fast spacing poke; Archive Hook: hooking forearm with
  file-card fan, paper-teal crescent, mid pressure; Clinic Sweep: low precise kick through floor grid, blue-white diagnostic spark, control ender

  Specials: B>A Discipline Beam: startup lens/glasses catch a teal light, active thin horizontal blue-teal beam fires from pointing hand, impact
  target framed by small grid brackets, recovery hand lowers as beam line fades; BvA Prison Grid Field: startup steps down and stamps an archive
  card, active floor grid rises as square prison bars, impact short boxed field locks space without covering body, recovery grid retracts to the
  floor; B<J Discourse Escape: startup coat folds inward like a file closing, active backstep slide through a broken sentence-like line with no
  readable text, impact afterimage becomes a torn archive silhouette, recovery reappears calm and angled away; BvJ Biopower Zone: startup raises
  both hands as measuring marks appear, active large transparent clinic grid forms around feet, impact pulse reveals bodies with teal brackets
  and red warning ticks, recovery stands at center of fading institution grid'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'black coat #101114, clinic white #DDE6E8, archive paper #C9B88A, panopticon teal #39C5BB, surveillance blue #4A7DFF, warning
  red #C23B3B'
appearance_bible: bald head, round glasses, severe eyes, black turtleneck and long academic coat, narrow trousers, gloved or ink-stained hands,
  file-folder or archive cards, thin surveillance grid VFX
animation_bible: still analytical idle, clipped institutional walk, sliding grid-step run, compact vertical jump, forearm-plus-grid block, cold
  reveal gesture victory
move_render_descriptions:
  normal_moves:
  - name: Disciplinary Tap
    pose: short baton-like finger or folder jab
    vfx: tiny teal grid tick
    gameplay: fast spacing poke
  - name: Archive Hook
    pose: hooking forearm with file-card fan
    vfx: paper-teal crescent
    gameplay: mid pressure
  - name: Clinic Sweep
    pose: low precise kick through floor grid
    vfx: blue-white diagnostic spark
    gameplay: control ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Discipline Beam
    startup: lens/glasses catch a teal light
    active: thin horizontal blue-teal beam fires from pointing hand
    impact: target framed by small grid brackets
    recovery: hand lowers as beam line fades
  - command: BvA
    commandSlot: BDA
    name: Prison Grid Field
    startup: steps down and stamps an archive card
    active: floor grid rises as square prison bars
    impact: short boxed field locks space without covering body
    recovery: grid retracts to the floor
  - command: B<J
    commandSlot: BBJ
    name: Discourse Escape
    startup: coat folds inward like a file closing
    active: backstep slide through a broken sentence-like line with no readable text
    impact: afterimage becomes a torn archive silhouette
    recovery: reappears calm and angled away
  - command: BvJ
    commandSlot: BDJ
    name: Biopower Zone
    startup: raises both hands as measuring marks appear
    active: large transparent clinic grid forms around feet
    impact: pulse reveals bodies with teal brackets and red warning ticks
    recovery: stands at center of fading institution grid
grids:
- id: foucault_grid01_movement
  output: characters/foucault/sprites/foucault_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: still analytical idle, clipped institutional walk, sliding grid-step run, compact vertical jump, forearm-plus-grid
    block, cold reveal gesture victory. 2 idle B tiny alternate breath/weight shift. 3 light hurt contained recoil. 4 heavy hurt stronger recoil
    but identity intact. 5-8 walk cycle with four distinct foot phases and prop/costume lag. 9-12 run cycle: acceleration, longest stride, pass
    step, push-off. 13 vertical jump takeoff. 14 jump in air. 15 running jump arc. 16 K.O. full body visible. Keep prop/costume readable in every
    frame; no duplicate silhouettes; no cross-cell trails.'
- id: foucault_grid02_fighting
  output: characters/foucault/sprites/foucault_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Disciplinary Tap startup: short baton-like finger or folder jab. 2 Disciplinary Tap impact: tiny teal grid tick. 3 recovery.
    4 Archive Hook running startup: hooking forearm with file-card fan. 5 impact: paper-teal crescent. 6 slide/recovery. 7 aerial/running startup
    for Clinic Sweep. 8 aerial impact: low precise kick through floor grid, blue-white diagnostic spark. 9 landing recovery. 10 running evasion/block
    start. 11 character-specific guarded block. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory
    pose B. Each 3-frame clip must show anticipation, active, recovery.'
- id: foucault_grid03_throws_consumes_swings
  output: characters/foucault/sprites/foucault_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: archive card / file stamp use / clipboard-edge sweep. 2 throw windup. 3 throw release.
    4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup. 10 swing impact. 11 swing
    follow-through. 12 reset. 13 B>A Discipline Beam keypose: thin horizontal blue-teal beam fires from pointing hand / target framed by small
    grid brackets. 14 BvA Prison Grid Field keypose: floor grid rises as square prison bars / short boxed field locks space without covering body.
    15 B<J Discourse Escape keypose: backstep slide through a broken sentence-like line with no readable text / afterimage becomes a torn archive
    silhouette. 16 BvJ Biopower Zone keypose: large transparent clinic grid forms around feet / pulse reveals bodies with teal brackets and red
    warning ticks. Compact VFX only; caster silhouette first.'
- id: foucault_grid04_specials
  output: characters/foucault/sprites/foucault_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Discipline Beam, B>A: 1 startup lens/glasses catch a teal light; 2 active thin horizontal blue-teal beam fires from pointing hand;
    3 impact/sustain target framed by small grid brackets; 4 recovery hand lowers as beam line fades.

    Row 2, Prison Grid Field, BvA: 5 startup steps down and stamps an archive card; 6 active floor grid rises as square prison bars; 7 impact/sustain
    short boxed field locks space without covering body; 8 recovery grid retracts to the floor.

    Row 3, Discourse Escape, B<J: 9 startup coat folds inward like a file closing; 10 active backstep slide through a broken sentence-like line
    with no readable text; 11 impact/sustain afterimage becomes a torn archive silhouette; 12 recovery reappears calm and angled away.

    Row 4, Biopower Zone, BvJ: 13 startup raises both hands as measuring marks appear; 14 active large transparent clinic grid forms around feet;
    15 impact/sustain pulse reveals bodies with teal brackets and red warning ticks; 16 recovery stands at center of fading institution grid.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: bald head, round glasses, severe eyes, black turtleneck and long academic coat, narrow trousers, gloved or ink-stained hands,
      file-folder or archive cards, thin surveillance grid VFX
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: beams, grids, reveal/silence; VFX must stay behind or around the silhouette unless it is the
      impact frame'
  palette_budget:
    primary: '#101114'
    secondary: '#DDE6E8'
    accent: '#C9B88A'
    vfx_1: '#39C5BB'
    vfx_2: '#4A7DFF'
    shadow: '#C23B3B'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Michel Foucault as control zoner through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Disciplinary Tap: startup, impact, recovery'
      4-6: 'running Archive Hook: run transition, impact, slide/recover'
      7-9: 'aerial/running Clinic Sweep: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Discipline Beam keypose
      '14': BvA Prison Grid Field keypose
      '15': B<J Discourse Escape keypose
      '16': BvJ Biopower Zone keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize beams, grids, reveal/silence
    rows:
      row1_frames_1_4: 'B>A Discipline Beam: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'BvA Prison Grid Field: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B<J Discourse Escape: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Biopower Zone: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
