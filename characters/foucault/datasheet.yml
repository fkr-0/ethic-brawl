version: 1
enhancement_version: 2
id: foucault
title: Michel Foucault
subtitle: The Panopticon Archivist
role: control zoner
element_mechanic: beams, grids, reveal/silence
source_notes:
- prompt-first; alias preserves existing focault asset spelling
full_biography:
  summary: Historian of power, discipline, clinics, prisons, sexuality, and discourse recast as a control zoner who turns the arena into an archive
    of visible bodies. He does not overpower opponents; he frames them, reveals them, silences their options, and lets the grid do the punishment.
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 9
    strength: 4
    agility: 6
    vitality: 6
    energy: 9
appearance_bible:
  appearance: bald head, round glasses, severe eyes, black turtleneck and long academic coat, narrow trousers, gloved or ink-stained hands, file-folder
    or archive cards, thin surveillance grid VFX
  palette: 'black coat #101114, clinic white #DDE6E8, archive paper #C9B88A, panopticon teal #39C5BB, surveillance blue #4A7DFF, warning red #C23B3B'
  motion: still analytical idle, clipped institutional walk, sliding grid-step run, compact vertical jump, forearm-plus-grid block, cold reveal
    gesture victory
  items: archive card / file stamp use / clipboard-edge sweep
move_render_descriptions:
  normal_moves:
  - name: Disciplinary Tap
    pose: short baton-like finger or folder jab
    vfx: tiny teal grid tick
    gameplay: fast spacing poke
  - name: Archive Hook
    pose: hooking forearm with file-card fan
    vfx: paper-teal crescent
    gameplay: mid pressure
  - name: Clinic Sweep
    pose: low precise kick through floor grid
    vfx: blue-white diagnostic spark
    gameplay: control ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Discipline Beam
    startup: lens/glasses catch a teal light
    active: thin horizontal blue-teal beam fires from pointing hand
    impact: target framed by small grid brackets
    recovery: hand lowers as beam line fades
  - command: BvA
    commandSlot: BDA
    name: Prison Grid Field
    startup: steps down and stamps an archive card
    active: floor grid rises as square prison bars
    impact: short boxed field locks space without covering body
    recovery: grid retracts to the floor
  - command: B<J
    commandSlot: BBJ
    name: Discourse Escape
    startup: coat folds inward like a file closing
    active: backstep slide through a broken sentence-like line with no readable text
    impact: afterimage becomes a torn archive silhouette
    recovery: reappears calm and angled away
  - command: BvJ
    commandSlot: BDJ
    name: Biopower Zone
    startup: raises both hands as measuring marks appear
    active: large transparent clinic grid forms around feet
    impact: pulse reveals bodies with teal brackets and red warning ticks
    recovery: stands at center of fading institution grid
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
