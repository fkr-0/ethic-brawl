production_checklist:
  asset_files_expected:
  - characters/foucault/sprites/foucault_grid01_movement.png
  - characters/foucault/sprites/foucault_grid02_fighting.png
  - characters/foucault/sprites/foucault_grid03_throws_consumes_swings.png
  - characters/foucault/sprites/foucault_grid04_specials.png
  validation:
  - image dimensions divisible by 4 in both axes
  - alpha background present and not replaced by checkerboard
  - 16 cells detected with equal width/height
  - grounded frames share a stable foot baseline
  - no text, labels, captions, UI, watermark, or speech bubbles inside the image
  - no limb/prop cropping at cell boundaries
  - character scale drift across cells less than roughly 10 percent
  runtime_binding:
    manifest: characters/foucault/sprite-grid-manifest.json
    prompt_pack: characters/foucault/prompts.yml
    placeholder_ok: true
    replace_placeholder_when: a final generated sheet passes validation and preserves clip ordering
  review_priority:
  - grid01 movement loop quality
  - grid02 attack readability
  - grid04 special VFX containment
  - UI portrait consistency
