  palette: 'robe #EEE8D8, robe shadow #CFC7B2, bronze #B8873A, scroll #C9A96A, lyceum gold #F0C04A, logic blue #5F8FBF'
  motion: teacherly staff-rest idle, calm procession walk, deliberate forceful run, disciplined compact hop, staff category-guard
  items: bronze category token / quick scroll consultation / clean staff sweep
