full_biography:
  summary: Greek system-builder of logic, ethics, rhetoric, and classification recast as the grounded all-rounder. Every strike has a cause, every
    guard has a category, and every field seeks the golden mean between offense and defense.
  combat_read: Distinctive runtime-backed philosopher fighter identity for prompt and UI use.
