version: 2
character_id: aristotle
title: Aristotle
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for image-rendering LLMs.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Aristotle.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom.

  Every cell must be the same size, perfectly aligned, with no gutters, no margins, no border, no labels, no text.

  Use true alpha transparency. Keep the same character identity, costume, palette, scale, camera angle, lighting, and pixel density in all 16
  cells.

  Right-facing side-view fighter poses unless a frame explicitly says left-facing recovery. Keep the full body inside every cell.

  Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Prioritize body pose clarity over large magical effects.'
character_sprite_brief: 'Aristotle — The Peripatetic; role: balanced adaptive fighter.

  Biography: Greek system-builder of logic, ethics, rhetoric, and classification recast as the grounded all-rounder. Every strike has a cause,
  every guard has a category, and every field seeks the golden mean between offense and defense.

  Appearance: short curled beard, calm teacher expression, white robe/chiton with bronze trim, leather scroll strap, short staff, parchment scroll,
  simple sandals.

  Palette: robe #EEE8D8, robe shadow #CFC7B2, bronze #B8873A, scroll #C9A96A, lyceum gold #F0C04A, logic blue #5F8FBF.

  Animation identity: teacherly staff-rest idle, calm procession walk, deliberate forceful run, disciplined compact hop, staff category-guard.

  Normals: Golden Mean Jab: short centered staff jab, gold dot at staff tip, safe opener; Syllogism Lance: phalanx-like staff drive, bronze triangle
  line, mid-range punish; Prime Mover Drop: overhead falling staff strike, gold ring crack, heavy anti-air ender

  Specials: B>A Golden Mean Palm: startup staff draws centerline, active palm and staff strike together, impact two gold impacts, recovery exact
  centered recovery; B<A Teleology Counter: startup staff crosses chest, active bronze category bracket guard, impact pushback logic pulse, recovery
  staff vertical rest; B^A Prime Mover Lift: startup knees dip staff down, active upward staff lift, impact gold ring lifts from floor, recovery
  overhead follow-through; BvJ Virtue Balance Field: startup plants staff opens scroll hand, active gold circle and triangle form, impact symmetrical
  rings pulse, recovery stands centered'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters, busy background, non-transparent
  background, checkerboard background, text, letters, labels, captions, speech bubbles, UI elements, watermark, logo, uneven grid, broken grid,
  offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion trails crossing cell boundaries, duplicate frames, heavy glow, bloom,
  soft shadow halos, anti-aliased fringe, costume changes, face changes, weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'robe #EEE8D8, robe shadow #CFC7B2, bronze #B8873A, scroll #C9A96A, lyceum gold #F0C04A, logic blue #5F8FBF'
appearance_bible: short curled beard, calm teacher expression, white robe/chiton with bronze trim, leather scroll strap, short staff, parchment
  scroll, simple sandals
animation_bible: teacherly staff-rest idle, calm procession walk, deliberate forceful run, disciplined compact hop, staff category-guard
