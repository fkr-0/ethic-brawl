grids:
- id: machiavelli_grid01_movement
  output: characters/machiavelli/sprites/machiavelli_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: predatory stillness, stalking walk, sudden low burst run, compact tactical jump, cloak-curtain block. 2 idle B:
    tiny alternate breath. 3 light hurt, contained recoil. 4 heavy hurt, stronger recoil but identity intact. 5-8 walk cycle: predatory stillness,
    stalking walk, sudden low burst run, compact tactical jump, cloak-curtain block with four distinct foot phases. 9-12 run cycle: role-specific
    acceleration, longest stride, pass step, push-off. 13 jump takeoff. 14 jump air. 15 running jump. 16 K.O. full body visible. Keep prop/costume
    readable in every frame; no duplicate silhouettes.'
- id: machiavelli_grid02_fighting
  output: characters/machiavelli/sprites/machiavelli_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Court Feint startup: false bow into hidden-hand poke. 2 Court Feint impact: tiny oxblood slash. 3 recovery. 4 Prince''s
    Edict running startup: diagonal cloak slash plus thrust. 5 impact: oxblood slash and steel glint. 6 recovery. 7 aerial/running attack startup
    for Palace Coup. 8 impact: low-to-high cloak-banner strike, magenta crack. 9 landing recovery. 10 running evasion start. 11 guarded block
    using character identity. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame
    clip must show anticipation, active, recovery.'
- id: machiavelli_grid03_throws_consumes_swings
  output: characters/machiavelli/sprites/machiavelli_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: dagger coin or trap token / sealing parchment decree / cloak sweep into hidden thrust.
    2 throw windup. 3 throw release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing
    startup. 10 swing impact. 11 swing follow-through. 12 reset. 13 B>A Prince''s Gambit Lunge keypose: abrupt diagonal blade lunge / magenta
    exposed mark. 14 B<A Court Intrigue Parry keypose: cloak curtain shield / dagger riposte from darkness. 15 BvA Coup Trap keypose: small magenta
    floor sigil / root spark arms. 16 B>J Opportunist Dash keypose: black afterimage cross-up / reappears behind-angle. Compact VFX only; caster
    silhouette first.'
- id: machiavelli_grid04_specials
  output: characters/machiavelli/sprites/machiavelli_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Prince''s Gambit Lunge, B>A: 1 startup false retreat cloak hides arm; 2 active abrupt diagonal blade lunge; 3 impact/sustain magenta
    exposed mark; 4 recovery slides past line.

    Row 2, Court Intrigue Parry, B<A: 5 startup smug exposed shoulder; 6 active cloak curtain shield; 7 impact/sustain dagger riposte from darkness;
    8 recovery cloak closes.

    Row 3, Coup Trap, BvA: 9 startup kneeling gloved setup; 10 active small magenta floor sigil; 11 impact/sustain root spark arms; 12 recovery
    withdraws without looking.

    Row 4, Opportunist Dash, B>J: 13 startup low loaded boot; 14 active black afterimage cross-up; 15 impact/sustain reappears behind-angle; 16
    recovery cloak settles.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: slick dark hair, pointed beard, narrow calculating eyes, dark renaissance doublet, black cloak wedges, oxblood trim, gloves,
      hard boots, hidden dagger and parchment seal
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: Feints, cloak-assisted strikes, hidden thrusts, launchers, counter stance, ground trap, cross-up
      dash.; VFX must stay behind or around the silhouette unless it is the impact frame'
  palette_budget:
    primary: '#111014'
    secondary: '#6E1720'
    accent: '#6F7880'
    vfx_1: '#D4B48C'
    vfx_2: '#47424B'
    shadow: '#FF00FF'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Niccolò Machiavelli as feint assassin through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Court Feint: startup, impact, recovery'
      4-6: 'running Prince''s Edict: run transition, impact, slide/recover'
      7-9: 'aerial/running Palace Coup: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Prince's Gambit Lunge keypose
      '14': B<A Court Intrigue Parry keypose
      '15': BvA Coup Trap keypose
      '16': B>J Opportunist Dash keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize Feints, cloak-assisted strikes, hidden thrusts, launchers, counter stance, ground trap, cross-up
      dash.
    rows:
      row1_frames_1_4: 'B>A Prince''s Gambit Lunge: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Court Intrigue Parry: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'BvA Coup Trap: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'B>J Opportunist Dash: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
