version: 2
character_id: machiavelli
title: Niccolò Machiavelli
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for image-rendering LLMs.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Niccolò Machiavelli.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom.

  Every cell must be the same size, perfectly aligned, with no gutters, no margins, no border, no labels, no text.

  Use true alpha transparency. Keep the same character identity, costume, palette, scale, camera angle, lighting, and pixel density in all 16
  cells.

  Right-facing side-view fighter poses unless a frame explicitly says left-facing recovery. Keep the full body inside every cell.

  Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Prioritize body pose clarity over large magical effects.'
character_sprite_brief: 'Niccolò Machiavelli — The Strategist; role: feint assassin.

  Biography: Florentine diplomat and author of The Prince recast as a courtly assassin of tactics. He treats combat as statecraft: a retreat is
  a lunge, a bow hides a blade, and a trap is simply policy made visible. His arc is observation, conspiracy, execution.

  Appearance: slick dark hair, pointed beard, narrow calculating eyes, dark renaissance doublet, black cloak wedges, oxblood trim, gloves, hard
  boots, hidden dagger and parchment seal.

  Palette: black #111014, cloak #07070A, oxblood #6E1720, steel #6F7880, parchment #D4B48C, trap magenta #FF00FF.

  Animation identity: predatory stillness, stalking walk, sudden low burst run, compact tactical jump, cloak-curtain block.

  Normals: Court Feint: false bow into hidden-hand poke, tiny oxblood slash, deceptive opener; Prince''s Edict: diagonal cloak slash plus thrust,
  oxblood slash and steel glint, launcher pressure; Palace Coup: low-to-high cloak-banner strike, magenta crack, heavy launcher

  Specials: B>A Prince''s Gambit Lunge: startup false retreat cloak hides arm, active abrupt diagonal blade lunge, impact magenta exposed mark,
  recovery slides past line; B<A Court Intrigue Parry: startup smug exposed shoulder, active cloak curtain shield, impact dagger riposte from
  darkness, recovery cloak closes; BvA Coup Trap: startup kneeling gloved setup, active small magenta floor sigil, impact root spark arms, recovery
  withdraws without looking; B>J Opportunist Dash: startup low loaded boot, active black afterimage cross-up, impact reappears behind-angle, recovery
  cloak settles'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters, busy background, non-transparent
  background, checkerboard background, text, letters, labels, captions, speech bubbles, UI elements, watermark, logo, uneven grid, broken grid,
  offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion trails crossing cell boundaries, duplicate frames, heavy glow, bloom,
  soft shadow halos, anti-aliased fringe, costume changes, face changes, weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'black #111014, cloak #07070A, oxblood #6E1720, steel #6F7880, parchment #D4B48C, trap magenta #FF00FF'
appearance_bible: slick dark hair, pointed beard, narrow calculating eyes, dark renaissance doublet, black cloak wedges, oxblood trim, gloves,
  hard boots, hidden dagger and parchment seal
animation_bible: predatory stillness, stalking walk, sudden low burst run, compact tactical jump, cloak-curtain block
