biography:
  capsule: Renaissance political strategist recast as a predatory feint assassin who wins through position, traps, counters, and ruthless lunges.
  fantasy: A courtly assassin who uses cloak misdirection, sudden acceleration, and tactical cruelty to make every exchange feel planned.
  personality:
  - calculating
  - predatory
  - composed
  - opportunistic
  - ruthless
  quotes:
    intro:
    - It is better to be feared than loved.
    - The ends justify the means.
    - Politics have no relation to morals.
    victory:
    - Men are so simple.
    - Fortune favors the bold.
    - You were useful. Briefly.
    defeat:
    - Even the Prince can fall...
    - The conspiracy succeeded.
    special:
    - THE ENDS JUSTIFY!
    - RETRIBUTION!
