fighting_characteristics:
  movement_style: Deceptive stop-start rhythm; stalking acceleration into sudden bursts.
  combat_style: Feints, cloak-assisted strikes, hidden thrusts, launchers, counter stance, ground trap, cross-up dash.
  strengths:
  - high agility
  - burst engage
  - counter punishment
  - trap setup
  - launcher pressure
  weaknesses:
  - low vitality
  - committal schemes if read
  - relies on positioning and cooldown timing
  behavior:
    neutral: Stalk just outside range, bait reactions with micro-feints and cloak movement.
    pressure: Court Feint opens into Prince's Edict and Palace Coup launcher when the opponent freezes.
    defense: Court Intrigue Parry and Opportunist Dash replace honest blocking.
    finisher: Root with Coup Trap or expose with Prince's Gambit Lunge before close execution poses.
