full_biography:
  summary: 'Florentine diplomat and author of The Prince recast as a courtly assassin of tactics. He treats combat as statecraft: a retreat is
    a lunge, a bow hides a blade, and a trap is simply policy made visible. His arc is observation, conspiracy, execution.'
  combat_read: Distinctive runtime-backed philosopher fighter identity for prompt and UI use.
appearance_bible:
  appearance: slick dark hair, pointed beard, narrow calculating eyes, dark renaissance doublet, black cloak wedges, oxblood trim, gloves, hard
    boots, hidden dagger and parchment seal
  palette: 'black #111014, cloak #07070A, oxblood #6E1720, steel #6F7880, parchment #D4B48C, trap magenta #FF00FF'
  motion: predatory stillness, stalking walk, sudden low burst run, compact tactical jump, cloak-curtain block
  items: dagger coin or trap token / sealing parchment decree / cloak sweep into hidden thrust
