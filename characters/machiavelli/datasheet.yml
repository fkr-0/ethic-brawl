production_checklist:
  asset_files_expected:
  - characters/machiavelli/sprites/machiavelli_grid01_movement.png
  - characters/machiavelli/sprites/machiavelli_grid02_fighting.png
  - characters/machiavelli/sprites/machiavelli_grid03_throws_consumes_swings.png
