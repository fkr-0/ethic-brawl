visual_characteristics:
  build: Narrow, wiry, low-center silhouette with sudden forward reach.
  face_hair: Sharp features, slicked dark hair, pointed beard.
  clothing: Dark renaissance doublet fused with tactical tailoring, gloves, hard-soled boots, cloak panels for misdirection.
  silhouette_hooks:
  - pointed beard and slicked head profile
  - dark cloak or doublet panel slicing diagonally through poses
  - hidden dagger/thrust hand kept close until the attack frame
  - low oblique kicks and abrupt diagonal lunges
  sprite_style: Readable 2D pixel-art fighter, side-view, chibi-to-arcade proportions, transparent alpha, no background.
