full_biography:
  summary: Medieval scholastic theologian and philosopher recast as a cathedral made mobile. He absorbs objections as pressure, answers with radiant
    proofs, and turns the floor beneath him into consecrated ground.
  combat_read: Distinctive runtime-backed philosopher fighter identity for prompt and UI use.
