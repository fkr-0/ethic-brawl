version: 2
character_id: aquinas
title: Thomas Aquinas
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for image-rendering LLMs.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Thomas Aquinas.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom.

  Every cell must be the same size, perfectly aligned, with no gutters, no margins, no border, no labels, no text.

  Use true alpha transparency. Keep the same character identity, costume, palette, scale, camera angle, lighting, and pixel density in all 16
  cells.

  Right-facing side-view fighter poses unless a frame explicitly says left-facing recovery. Keep the full body inside every cell.

  Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Prioritize body pose clarity over large magical effects.'
character_sprite_brief: 'Thomas Aquinas — The Angelic Doctor; role: holy tank.

  Biography: Medieval scholastic theologian and philosopher recast as a cathedral made mobile. He absorbs objections as pressure, answers with
  radiant proofs, and turns the floor beneath him into consecrated ground.

  Appearance: broad monk face under Dominican hood, black-and-white habit, rope belt, chained codex, heavy grounded frame, serene immovable expression.

  Palette: habit black #17171A, habit white #F1EFE4, cloth shadow #BAB7A8, codex brown #6B4E2E, divine gold #F3D36B, ivory #FFF4C8.

  Animation identity: deep cloth-settling breath, heavy walk, unstoppable slow run, short heavy jump, codex shield block.

  Normals: Summa Strike: planted forearm/codex shove, ivory impact square, armored light bash; Scholastic Hammer: codex gavel overhead, gold page
  flash, medium punish; Cathedral Charge: shoulder and codex rush, stone dust and gold edge, heavy knockback

  Specials: B>A Five Ways Ray: startup opens codex five sparks align, active five chunky gold rays fan forward, impact narrow rays reveal body,
  recovery codex half-closes; B<A Scholastic Shield: startup codex lifted vertically, active ivory-gold shield wall, impact square cathedral tiles
  absorb, recovery aura contracts; BvA Basilica Consecration: startup lowers codex to ground, active gold basilica sigil appears, impact floor
  pulse expands, recovery rises slowly; BvJ Prime Cause Field: startup codex raised both hands, active contained cathedral aura, impact gold rings
  stabilize, recovery immovable stance'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters, busy background, non-transparent
  background, checkerboard background, text, letters, labels, captions, speech bubbles, UI elements, watermark, logo, uneven grid, broken grid,
  offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion trails crossing cell boundaries, duplicate frames, heavy glow, bloom,
  soft shadow halos, anti-aliased fringe, costume changes, face changes, weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'habit black #17171A, habit white #F1EFE4, cloth shadow #BAB7A8, codex brown #6B4E2E, divine gold #F3D36B, ivory #FFF4C8'
appearance_bible: broad monk face under Dominican hood, black-and-white habit, rope belt, chained codex, heavy grounded frame, serene immovable
  expression
animation_bible: deep cloth-settling breath, heavy walk, unstoppable slow run, short heavy jump, codex shield block
move_render_descriptions:
  normal_moves:
  - name: Summa Strike
    pose: planted forearm/codex shove
    vfx: ivory impact square
    gameplay: armored light bash
  - name: Scholastic Hammer
    pose: codex gavel overhead
    vfx: gold page flash
    gameplay: medium punish
  - name: Cathedral Charge
    pose: shoulder and codex rush
    vfx: stone dust and gold edge
    gameplay: heavy knockback
  special_moves:
  - command: B>A
    name: Five Ways Ray
    startup: opens codex five sparks align
    active: five chunky gold rays fan forward
    impact: narrow rays reveal body
    recovery: codex half-closes
  - command: B<A
    name: Scholastic Shield
    startup: codex lifted vertically
    active: ivory-gold shield wall
    impact: square cathedral tiles absorb
    recovery: aura contracts
  - command: BvA
    name: Basilica Consecration
    startup: lowers codex to ground
    active: gold basilica sigil appears
    impact: floor pulse expands
    recovery: rises slowly
  - command: BvJ
    name: Prime Cause Field
