grids:
- id: aquinas_grid01_movement
  output: characters/aquinas/sprites/aquinas_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: deep cloth-settling breath, heavy walk, unstoppable slow run, short heavy jump, codex shield block. 2 idle B:
    tiny alternate breath. 3 light hurt, contained recoil. 4 heavy hurt, stronger recoil but identity intact. 5-8 walk cycle: deep cloth-settling
    breath, heavy walk, unstoppable slow run, short heavy jump, codex shield block with four distinct foot phases. 9-12 run cycle: role-specific
    acceleration, longest stride, pass step, push-off. 13 jump takeoff. 14 jump air. 15 running jump. 16 K.O. full body visible. Keep prop/costume
    readable in every frame; no duplicate silhouettes.'
- id: aquinas_grid02_fighting
  output: characters/aquinas/sprites/aquinas_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Summa Strike startup: planted forearm/codex shove. 2 Summa Strike impact: ivory impact square. 3 recovery. 4 Scholastic
    Hammer running startup: codex gavel overhead. 5 impact: gold page flash. 6 recovery. 7 aerial/running attack startup for Cathedral Charge.
    8 impact: shoulder and codex rush, stone dust and gold edge. 9 landing recovery. 10 running evasion start. 11 guarded block using character
    identity. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must show
    anticipation, active, recovery.'
- id: aquinas_grid03_throws_consumes_swings
  output: characters/aquinas/sprites/aquinas_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: reliquary seal / read from codex / codex hammer swing. 2 throw windup. 3 throw release.
    4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup. 10 swing impact. 11 swing
    follow-through. 12 reset. 13 B>A Five Ways Ray keypose: five chunky gold rays fan forward / narrow rays reveal body. 14 B<A Scholastic Shield
    keypose: ivory-gold shield wall / square cathedral tiles absorb. 15 BvA Basilica Consecration keypose: gold basilica sigil appears / floor
    pulse expands. 16 BvJ Prime Cause Field keypose: contained cathedral aura / gold rings stabilize. Compact VFX only; caster silhouette first.'
- id: aquinas_grid04_specials
  output: characters/aquinas/sprites/aquinas_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Five Ways Ray, B>A: 1 startup opens codex five sparks align; 2 active five chunky gold rays fan forward; 3 impact/sustain narrow rays
    reveal body; 4 recovery codex half-closes.

    Row 2, Scholastic Shield, B<A: 5 startup codex lifted vertically; 6 active ivory-gold shield wall; 7 impact/sustain square cathedral tiles
    absorb; 8 recovery aura contracts.

    Row 3, Basilica Consecration, BvA: 9 startup lowers codex to ground; 10 active gold basilica sigil appears; 11 impact/sustain floor pulse
    expands; 12 recovery rises slowly.

    Row 4, Prime Cause Field, BvJ: 13 startup codex raised both hands; 14 active contained cathedral aura; 15 impact/sustain gold rings stabilize;
    16 recovery immovable stance.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: broad monk face under Dominican hood, black-and-white habit, rope belt, chained codex, heavy grounded frame, serene immovable
      expression
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: holy tank using divine rays, shields, consecrated ground.; VFX must stay behind or around the
      silhouette unless it is the impact frame'
  palette_budget:
    primary: '#17171A'
    secondary: '#F1EFE4'
    accent: '#6B4E2E'
    vfx_1: '#F3D36B'
    vfx_2: '#FFF4C8'
    shadow: '#141414'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Thomas Aquinas as holy tank through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Summa Strike: startup, impact, recovery'
      4-6: 'running Scholastic Hammer: run transition, impact, slide/recover'
      7-9: 'aerial/running Cathedral Charge: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Five Ways Ray keypose
      '14': B<A Scholastic Shield keypose
      '15': BvA Basilica Consecration keypose
      '16': BvJ Prime Cause Field keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize holy tank using divine rays, shields, consecrated ground.
    rows:
      row1_frames_1_4: 'B>A Five Ways Ray: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Scholastic Shield: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'BvA Basilica Consecration: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Prime Cause Field: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
