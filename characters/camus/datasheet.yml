  - name: Rebel Backfist
    pose: half-turn backfist with smoke crescent
    vfx: gray arc with void-teal edge
    gameplay: mid pressure and whiff punish
  - name: Sisyphus Heel
    pose: precise lateral heel or heel-drop
    vfx: sun glint at heel
