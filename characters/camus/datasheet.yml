fighting_characteristics:
  movement_style: Calm, light-footed, elegant, evasive; runs like a dancer slipping between strikes.
  combat_style: Compact jab/backfist/heel chain, precise counters, shockwave zoning, mobility dash, slow domain.
  strengths:
  - air control
  - counter timing
  - mid-range shockwave
  - safe repositioning
  - clean recovery
  weaknesses:
  - moderate raw vitality
  - needs timing
  - less brute-force pressure than rushdown characters
  behavior:
    neutral: Bait with idle calm, probe with Absurd Jab, step just outside threat range.
    pressure: Use Rebel Backfist into Sisyphus Heel after whiff punish or guarded jab.
    defense: Prefer Rebel Reversal and Invincible Summer Dash over hard blocking.
    finisher: The Absurd Domain creates a slow field, then Camus advances with measured strikes.
