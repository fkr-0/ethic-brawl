full_biography:
  summary: French-Algerian absurdist writer and moral rebel recast as a calm cigarette-lit duelist. He fights not because the universe gives meaning,
    but because revolt is the only honest answer to meaninglessness. His round arc moves from detached observer, to precise counter-rebel, to
    a quiet victory gesture that refuses melodrama.
  combat_read: Distinctive runtime-backed philosopher fighter identity for prompt and UI use.
appearance_bible:
  appearance: sharp jaw, short dark hair, tired eyes, charcoal mid-century suit, off-white shirt, loosened tie, rolled sleeves, polished shoes,
    thin cigarette and controlled smoke ribbons
  palette: 'charcoal #24272B, off-white #E8E1D2, smoke #AEB5B8, sun gold #F6C453, void teal #00F5FF'
  motion: elegant dancer balance, small cigarette inhale idle, compact sidestep run, composed airborne tuck, forearm smoke-veil block
  items: cigarette case or ash pebble / brief inhale / coat-assisted backfist sweep
