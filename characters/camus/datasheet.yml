biography:
  capsule: French-Algerian absurdist philosopher recast as a calm, elegant duelist who weaponizes revolt, smoke, sun, and void shockwaves.
  fantasy: A cigarette-lit counter fighter who appears resigned, then slips through pressure and answers with a clean, compact rebellion.
  personality:
  - ironic
  - controlled
  - elegant
  - defiant
  - quietly fatalistic
  quotes:
    intro:
    - I rebel, therefore we exist.
    - The absurd is the essential concept.
    - One must imagine Sisyphus happy... and furious.
    victory:
    - The struggle itself is enough.
    - In the midst of winter, I found an invincible summer.
    - Your defeat was always meaningless. Sorry.
    defeat:
    - Perhaps this too is absurd...
    - At least I imagined myself happy.
    special:
    - ABSURD REVOLT!
    - EMBRACE THE VOID!
