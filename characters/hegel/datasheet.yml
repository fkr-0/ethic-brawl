    academic_coat: '#2A2625'
    waistcoat_warm: '#6B4A35'
    book_ivory: '#D8C7A1'
    dialectic_blue: '#4F7DB5'
    synthesis_gold: '#E0B84D'
fighting_characteristics:
  movement_style: Academic coat, broad stance, book-and-cane hybrid weapon, three-beat torso sway, accelerating argumentative run, synthesis impacts.
  combat_style: evolving combo engine using thesis/antithesis/synthesis states.
  strengths:
  - clear role identity
  - distinct silhouettes
  - specials mapped to MVP commands
  weaknesses:
  - requires new runtime implementation if not in CharacterDefinition
  - source art may be placeholder/debug quality
  behavior:
    neutral: Use movement and safest poke to test space before committing.
    pressure: Transition into the character's MVP command specials after a confirmed hit or whiff punish.
    defense: Use the assigned counter/block/special mechanic instead of generic blocking when possible.
    finisher: Resolve the kit fantasy with the BvJ domain/field/finisher where available.
