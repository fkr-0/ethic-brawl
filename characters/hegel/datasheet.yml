version: 1
id: hegel
title: G.W.F. Hegel
subtitle: The Dialectician
role: evolving combo engine
source_notes:
- Consolidated from roster prompt/design notes, LF2 specials roadmap, and available sprite manifests.
- 'Source status: has existing programmatic placeholder source sheets'
biography:
  capsule: Momentum orchestrator who chains stance transitions into escalating synthesis finishers.
  fantasy: A three-state combo engine whose attacks evolve from thesis to antithesis to synthesis as pressure builds.
  personality:
  - grand
  - methodical
  - escalating
  - argumentative
stored_stats:
  prompt_stats:
    intelligence: 10
    strength: 6
    agility: 5
    vitality: 8
    energy: 8
  proposed_runtime_base_stats:
    health: 100
    maxHealth: 100
    strength: 6
    defense: 8
    intelligence: 10
    agility: 5
    vitality: 8
    energy: 8
  implementation_status: runtime-backed in src/content/characters/character-data.ts, src/content/characters/character-loader.ts, and src/content/specials/special-data.ts
visual_characteristics:
  build: Broad professor silhouette with cane/book weapon and visible three-beat rhythm.
  appearance: Academic coat, broad stance, book-and-cane hybrid weapon, three-beat torso sway, accelerating argumentative run, synthesis impacts.
  sprite_style: Readable 2D pixel-art fighter, side-view, chibi-to-arcade proportions, transparent alpha, no background.
  silhouette_hooks:
  - primary prop or costume detail must remain visible in every frame
  - 'pose language must match role: evolving combo engine'
  - 'VFX should reinforce mechanic: thesis/antithesis/synthesis states'
palette:
