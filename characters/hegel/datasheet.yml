  ability_icon: 'three linked nodes: thesis, antithesis, synthesis'
  hud_meter: three-state dialectic meter with synthesis crown pulse
  roster_card: 'Show role as evolving combo engine; mechanic line: thesis/antithesis/synthesis states.'
  move_list_badges:
