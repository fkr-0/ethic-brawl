  - B<A
  - B>J
  - BvJ
normal_moves:
- id: hegel_thesis_tap
  name: Thesis Tap
  prompt_read: starter hit that opens branch
- id: hegel_antithesis_break
  name: Antithesis Break
  prompt_read: advancing breaker slash
- id: hegel_synthesis_crown
  name: Synthesis Crown
  prompt_read: confirmed-hit ender with crown flash
specials:
  mvp_4:
  - command: B>A
    commandSlot: BFA
    id: hegel_thesis_bolt
    displayName: Thesis Bolt
