version: 2
character_id: hegel
title: G.W.F. Hegel
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for image-rendering LLMs.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: G.W.F. Hegel.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom.

  Every cell must be the same size, perfectly aligned, with no gutters, no margins, no border, no labels, no text.

  Use true alpha transparency. Keep the same character identity, costume, palette, scale, camera angle, lighting, and pixel density in all 16
  cells.

  Right-facing side-view fighter poses unless a frame explicitly says left-facing recovery. Keep the full body inside every cell.

  Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Prioritize body pose clarity over large magical effects.'
character_sprite_brief: 'G.W.F. Hegel — The Dialectician; role: evolving combo engine.

  Biography: German idealist of dialectic, history, contradiction, and Geist recast as a three-beat combo professor. One motion asserts, the next
  negates, the third resolves into synthesis.

  Appearance: stern professor face, heavy brow, dark academic coat, warm waistcoat, cravat, book-and-cane hybrid weapon, formal shoes.

  Palette: academic coat #2A2625, shadow #141212, waistcoat #6B4A35, book ivory #D8C7A1, dialectic blue #4F7DB5, synthesis gold #E0B84D.

  Animation identity: three-beat torso sway, deliberate lecturing walk, accelerating argumentative march, heavy professor leap, book-and-cane
  contradiction block.

  Normals: Thesis Tap: short cane assertion, blue thesis spark, starter; Antithesis Break: cross-body cane/book strike, blue-gold crossing slash,
  advancing pressure; Synthesis Crown: cane rises book opens, small crown flash, launcher ender

  Specials: B>A Thesis Bolt: startup book opens to blue point, active cane releases compact bolt, impact simple moving node, recovery book half-closes;
  B<A Antithesis Reversal: startup book raised cane back, active blue counter pulse crosses body, impact gold flash snaps outward, recovery twist
  resolves; B>J Synthesis Dash: startup three motes align at feet, active dash in three beats, impact third beat gold hit, recovery cane planted;
  BvJ World-Spirit Domain: startup book opens both hands, active blue-gold spiral field, impact three linked nodes orbit, recovery crown glint
  fades'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters, busy background, non-transparent
  background, checkerboard background, text, letters, labels, captions, speech bubbles, UI elements, watermark, logo, uneven grid, broken grid,
  offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion trails crossing cell boundaries, duplicate frames, heavy glow, bloom,
  soft shadow halos, anti-aliased fringe, costume changes, face changes, weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'academic coat #2A2625, shadow #141212, waistcoat #6B4A35, book ivory #D8C7A1, dialectic blue #4F7DB5, synthesis gold #E0B84D'
appearance_bible: stern professor face, heavy brow, dark academic coat, warm waistcoat, cravat, book-and-cane hybrid weapon, formal shoes
animation_bible: three-beat torso sway, deliberate lecturing walk, accelerating argumentative march, heavy professor leap, book-and-cane contradiction
  block
move_render_descriptions:
  normal_moves:
  - name: Thesis Tap
    pose: short cane assertion
    vfx: blue thesis spark
    gameplay: starter
  - name: Antithesis Break
    pose: cross-body cane/book strike
    vfx: blue-gold crossing slash
    gameplay: advancing pressure
  - name: Synthesis Crown
    pose: cane rises book opens
    vfx: small crown flash
    gameplay: launcher ender
  special_moves:
  - command: B>A
    name: Thesis Bolt
    startup: book opens to blue point
    active: cane releases compact bolt
    impact: simple moving node
    recovery: book half-closes
  - command: B<A
    name: Antithesis Reversal
    startup: book raised cane back
    active: blue counter pulse crosses body
    impact: gold flash snaps outward
    recovery: twist resolves
  - command: B>J
    name: Synthesis Dash
    startup: three motes align at feet
    active: dash in three beats
    impact: third beat gold hit
    recovery: cane planted
  - command: BvJ
    name: World-Spirit Domain
    startup: book opens both hands
    active: blue-gold spiral field
    impact: three linked nodes orbit
    recovery: crown glint fades
grids:
- id: hegel_grid01_movement
  output: characters/hegel/sprites/hegel_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: three-beat torso sway, deliberate lecturing walk, accelerating argumentative march, heavy professor leap, book-and-cane
    contradiction block. 2 idle B: tiny alternate breath. 3 light hurt, contained recoil. 4 heavy hurt, stronger recoil but identity intact. 5-8
    walk cycle: three-beat torso sway, deliberate lecturing walk, accelerating argumentative march, heavy professor leap, book-and-cane contradiction
    block with four distinct foot phases. 9-12 run cycle: role-specific acceleration, longest stride, pass step, push-off. 13 jump takeoff. 14
    jump air. 15 running jump. 16 K.O. full body visible. Keep prop/costume readable in every frame; no duplicate silhouettes.'
- id: hegel_grid02_fighting
  output: characters/hegel/sprites/hegel_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Thesis Tap startup: short cane assertion. 2 Thesis Tap impact: blue thesis spark. 3 recovery. 4 Antithesis Break running
    startup: cross-body cane/book strike. 5 impact: blue-gold crossing slash. 6 recovery. 7 aerial/running attack startup for Synthesis Crown.
    8 impact: cane rises book opens, small crown flash. 9 landing recovery. 10 running evasion start. 11 guarded block using character identity.
    12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must show anticipation,
    active, recovery.'
- id: hegel_grid03_throws_consumes_swings
  output: characters/hegel/sprites/hegel_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: chalk or page token / turn page in book / cane sweep with book counterbalance. 2
    throw windup. 3 throw release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing
    startup. 10 swing impact. 11 swing follow-through. 12 reset. 13 B>A Thesis Bolt keypose: cane releases compact bolt / simple moving node.
    14 B<A Antithesis Reversal keypose: blue counter pulse crosses body / gold flash snaps outward. 15 B>J Synthesis Dash keypose: dash in three
    beats / third beat gold hit. 16 BvJ World-Spirit Domain keypose: blue-gold spiral field / three linked nodes orbit. Compact VFX only; caster
    silhouette first.'
- id: hegel_grid04_specials
  output: characters/hegel/sprites/hegel_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Thesis Bolt, B>A: 1 startup book opens to blue point; 2 active cane releases compact bolt; 3 impact/sustain simple moving node; 4 recovery
    book half-closes.

    Row 2, Antithesis Reversal, B<A: 5 startup book raised cane back; 6 active blue counter pulse crosses body; 7 impact/sustain gold flash snaps
    outward; 8 recovery twist resolves.

    Row 3, Synthesis Dash, B>J: 9 startup three motes align at feet; 10 active dash in three beats; 11 impact/sustain third beat gold hit; 12
    recovery cane planted.

    Row 4, World-Spirit Domain, BvJ: 13 startup book opens both hands; 14 active blue-gold spiral field; 15 impact/sustain three linked nodes
    orbit; 16 recovery crown glint fades.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: stern professor face, heavy brow, dark academic coat, warm waistcoat, cravat, book-and-cane hybrid weapon, formal shoes
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: evolving combo engine using thesis/antithesis/synthesis states.; VFX must stay behind or around
      the silhouette unless it is the impact frame'
  palette_budget:
    primary: '#2A2625'
    secondary: '#6B4A35'
    accent: '#D8C7A1'
    vfx_1: '#4F7DB5'
    vfx_2: '#E0B84D'
    shadow: '#141414'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish G.W.F. Hegel as evolving combo engine through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Thesis Tap: startup, impact, recovery'
      4-6: 'running Antithesis Break: run transition, impact, slide/recover'
      7-9: 'aerial/running Synthesis Crown: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Thesis Bolt keypose
      '14': B<A Antithesis Reversal keypose
      '15': B>J Synthesis Dash keypose
      '16': BvJ World-Spirit Domain keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize evolving combo engine using thesis/antithesis/synthesis states.
    rows:
      row1_frames_1_4: 'B>A Thesis Bolt: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Antithesis Reversal: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B>J Synthesis Dash: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ World-Spirit Domain: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
