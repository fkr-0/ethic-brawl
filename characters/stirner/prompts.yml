version: 2
character_id: stirner
title: Max Stirner
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Max Stirner.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Max Stirner — The Unique; role: egoist trickster; mechanic: unique/ridiculous moves that break design rules.

  Biography/combat fantasy: Egoist provocateur recast as a rule-breaking trickster. Stirner attacks concepts as “spooks,” steals pose language
  from other fighters for a frame, and treats the arena like property to be appropriated.

  Appearance: sharp mischievous face, high forehead, unruly dark hair, small glasses or glinting eyes, dark shabby academic coat, mismatched gloves,
  torn manifesto scraps, chalk outlines and absurd little prop switches.

  Palette: ego black #101014, paper yellow #D8C171, chalk white #EDE6D0, spook violet #8C4DFF, absurd lime #A6FF3D, trick red #D94A4A.

  Animation identity: fidgety self-owned idle, lopsided walk, sudden zigzag run, ridiculous but readable jump, shrugging anti-guard block, mocking
  victory pose.

  Normals: Unique Jab: odd off-angle jab from too-relaxed stance, lime chalk tick, awkward opener; Spook Slap: backhand through a ghostly concept
  outline, violet pop, anti-guard pressure; Ownness Kick: self-satisfied sideways kick, red-lime spark, trick ender

  Specials: B>A Egoist Appropriation: startup reaches as if taking ownership of space, active snatches a small lime-violet arc forward, impact
  target space gets a chalk ownership bracket with no text, recovery pockets the stolen arc; B<A Spook Reversal: startup points at an imaginary
  authority, active violet spook mask appears as counter guard, impact mask bursts backward into riposte, recovery shrugs as if nothing happened;
  B>J Ownness Dash: startup leans the wrong way first, active zigzag dash violates normal anticipation, impact afterimage briefly mocks another
  stance, recovery lands with smug off-balance pose; BvJ Union of Egoists Domain: startup drops torn paper scraps around feet, active absurd lime/violet
  domain forms from mismatched shapes, impact tiny autonomous scraps orbit as temporary allies, recovery domain folds into coat pocket'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'ego black #101014, paper yellow #D8C171, chalk white #EDE6D0, spook violet #8C4DFF, absurd lime #A6FF3D, trick red #D94A4A'
appearance_bible: sharp mischievous face, high forehead, unruly dark hair, small glasses or glinting eyes, dark shabby academic coat, mismatched
  gloves, torn manifesto scraps, chalk outlines and absurd little prop switches
animation_bible: fidgety self-owned idle, lopsided walk, sudden zigzag run, ridiculous but readable jump, shrugging anti-guard block, mocking
  victory pose
move_render_descriptions:
  normal_moves:
  - name: Unique Jab
    pose: odd off-angle jab from too-relaxed stance
    vfx: lime chalk tick
    gameplay: awkward opener
  - name: Spook Slap
    pose: backhand through a ghostly concept outline
    vfx: violet pop
    gameplay: anti-guard pressure
  - name: Ownness Kick
    pose: self-satisfied sideways kick
    vfx: red-lime spark
    gameplay: trick ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Egoist Appropriation
    startup: reaches as if taking ownership of space
    active: snatches a small lime-violet arc forward
    impact: target space gets a chalk ownership bracket with no text
    recovery: pockets the stolen arc
  - command: B<A
    commandSlot: BBA
    name: Spook Reversal
    startup: points at an imaginary authority
    active: violet spook mask appears as counter guard
    impact: mask bursts backward into riposte
    recovery: shrugs as if nothing happened
  - command: B>J
    commandSlot: BFJ
    name: Ownness Dash
    startup: leans the wrong way first
    active: zigzag dash violates normal anticipation
    impact: afterimage briefly mocks another stance
    recovery: lands with smug off-balance pose
  - command: BvJ
    commandSlot: BDJ
    name: Union of Egoists Domain
    startup: drops torn paper scraps around feet
    active: absurd lime/violet domain forms from mismatched shapes
    impact: tiny autonomous scraps orbit as temporary allies
    recovery: domain folds into coat pocket
grids:
- id: stirner_grid01_movement
  output: characters/stirner/sprites/stirner_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: fidgety self-owned idle, lopsided walk, sudden zigzag run, ridiculous but readable jump, shrugging anti-guard
    block, mocking victory pose. 2 idle B tiny alternate breath/weight shift. 3 light hurt contained recoil. 4 heavy hurt stronger recoil but
    identity intact. 5-8 walk cycle with four distinct foot phases and prop/costume lag. 9-12 run cycle: acceleration, longest stride, pass step,
    push-off. 13 vertical jump takeoff. 14 jump in air. 15 running jump arc. 16 K.O. full body visible. Keep prop/costume readable in every frame;
    no duplicate silhouettes; no cross-cell trails.'
- id: stirner_grid02_fighting
  output: characters/stirner/sprites/stirner_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Unique Jab startup: odd off-angle jab from too-relaxed stance. 2 Unique Jab impact: lime chalk tick. 3 recovery. 4 Spook
    Slap running startup: backhand through a ghostly concept outline. 5 impact: violet pop. 6 slide/recovery. 7 aerial/running startup for Ownness
    Kick. 8 aerial impact: self-satisfied sideways kick, red-lime spark. 9 landing recovery. 10 running evasion/block start. 11 character-specific
    guarded block. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must
    show anticipation, active, recovery.'
- id: stirner_grid03_throws_consumes_swings
  output: characters/stirner/sprites/stirner_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: stolen sign token with no letters / pockets a prop / crooked cane-or-scrap swing.
    2 throw windup. 3 throw release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing
    startup. 10 swing impact. 11 swing follow-through. 12 reset. 13 B>A Egoist Appropriation keypose: snatches a small lime-violet arc forward
    / target space gets a chalk ownership bracket with no text. 14 B<A Spook Reversal keypose: violet spook mask appears as counter guard / mask
    bursts backward into riposte. 15 B>J Ownness Dash keypose: zigzag dash violates normal anticipation / afterimage briefly mocks another stance.
    16 BvJ Union of Egoists Domain keypose: absurd lime/violet domain forms from mismatched shapes / tiny autonomous scraps orbit as temporary
    allies. Compact VFX only; caster silhouette first.'
- id: stirner_grid04_specials
  output: characters/stirner/sprites/stirner_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Egoist Appropriation, B>A: 1 startup reaches as if taking ownership of space; 2 active snatches a small lime-violet arc forward; 3
    impact/sustain target space gets a chalk ownership bracket with no text; 4 recovery pockets the stolen arc.

    Row 2, Spook Reversal, B<A: 5 startup points at an imaginary authority; 6 active violet spook mask appears as counter guard; 7 impact/sustain
    mask bursts backward into riposte; 8 recovery shrugs as if nothing happened.

    Row 3, Ownness Dash, B>J: 9 startup leans the wrong way first; 10 active zigzag dash violates normal anticipation; 11 impact/sustain afterimage
    briefly mocks another stance; 12 recovery lands with smug off-balance pose.

    Row 4, Union of Egoists Domain, BvJ: 13 startup drops torn paper scraps around feet; 14 active absurd lime/violet domain forms from mismatched
    shapes; 15 impact/sustain tiny autonomous scraps orbit as temporary allies; 16 recovery domain folds into coat pocket.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: sharp mischievous face, high forehead, unruly dark hair, small glasses or glinting eyes, dark shabby academic coat, mismatched
      gloves, torn manifesto scraps, chalk outlines and absurd little prop switches
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: unique/ridiculous moves that break design rules; VFX must stay behind or around the silhouette
      unless it is the impact frame'
  palette_budget:
    primary: '#101014'
    secondary: '#D8C171'
    accent: '#EDE6D0'
    vfx_1: '#8C4DFF'
    vfx_2: '#A6FF3D'
    shadow: '#D94A4A'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Max Stirner as egoist trickster through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Unique Jab: startup, impact, recovery'
      4-6: 'running Spook Slap: run transition, impact, slide/recover'
      7-9: 'aerial/running Ownness Kick: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Egoist Appropriation keypose
      '14': B<A Spook Reversal keypose
      '15': B>J Ownness Dash keypose
      '16': BvJ Union of Egoists Domain keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize unique/ridiculous moves that break design rules
    rows:
      row1_frames_1_4: 'B>A Egoist Appropriation: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Spook Reversal: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B>J Ownness Dash: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Union of Egoists Domain: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
