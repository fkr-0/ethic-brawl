version: 1
enhancement_version: 2
id: stirner
title: Max Stirner
subtitle: The Unique
role: egoist trickster
element_mechanic: unique/ridiculous moves that break design rules
source_notes:
- fully spriteless prompt-first; no source sheet found
full_biography:
  summary: Egoist provocateur recast as a rule-breaking trickster. Stirner attacks concepts as “spooks,” steals pose language from other fighters
    for a frame, and treats the arena like property to be appropriated.
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 8
    strength: 5
    agility: 8
    vitality: 5
    energy: 8
appearance_bible:
  appearance: sharp mischievous face, high forehead, unruly dark hair, small glasses or glinting eyes, dark shabby academic coat, mismatched gloves,
    torn manifesto scraps, chalk outlines and absurd little prop switches
  palette: 'ego black #101014, paper yellow #D8C171, chalk white #EDE6D0, spook violet #8C4DFF, absurd lime #A6FF3D, trick red #D94A4A'
  motion: fidgety self-owned idle, lopsided walk, sudden zigzag run, ridiculous but readable jump, shrugging anti-guard block, mocking victory
    pose
  items: stolen sign token with no letters / pockets a prop / crooked cane-or-scrap swing
move_render_descriptions:
  normal_moves:
  - name: Unique Jab
    pose: odd off-angle jab from too-relaxed stance
    vfx: lime chalk tick
    gameplay: awkward opener
  - name: Spook Slap
    pose: backhand through a ghostly concept outline
    vfx: violet pop
    gameplay: anti-guard pressure
  - name: Ownness Kick
    pose: self-satisfied sideways kick
    vfx: red-lime spark
    gameplay: trick ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Egoist Appropriation
    startup: reaches as if taking ownership of space
    active: snatches a small lime-violet arc forward
    impact: target space gets a chalk ownership bracket with no text
    recovery: pockets the stolen arc
  - command: B<A
    commandSlot: BBA
    name: Spook Reversal
    startup: points at an imaginary authority
    active: violet spook mask appears as counter guard
    impact: mask bursts backward into riposte
    recovery: shrugs as if nothing happened
  - command: B>J
    commandSlot: BFJ
    name: Ownness Dash
    startup: leans the wrong way first
    active: zigzag dash violates normal anticipation
    impact: afterimage briefly mocks another stance
    recovery: lands with smug off-balance pose
  - command: BvJ
    commandSlot: BDJ
    name: Union of Egoists Domain
    startup: drops torn paper scraps around feet
    active: absurd lime/violet domain forms from mismatched shapes
    impact: tiny autonomous scraps orbit as temporary allies
    recovery: domain folds into coat pocket
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
sprite_outputs:
  source_references: []
  authored_prompt_pack: characters/stirner/prompts.yml
