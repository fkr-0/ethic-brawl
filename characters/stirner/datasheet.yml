asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: sharp mischievous face, high forehead, unruly dark hair, small glasses or glinting eyes, dark shabby academic coat, mismatched
      gloves, torn manifesto scraps, chalk outlines and absurd little prop switches
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: unique/ridiculous moves that break design rules; VFX must stay behind or around the silhouette
      unless it is the impact frame'
  palette_budget:
    primary: '#101014'
    secondary: '#D8C171'
    accent: '#EDE6D0'
    vfx_1: '#8C4DFF'
    vfx_2: '#A6FF3D'
    shadow: '#D94A4A'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Max Stirner as egoist trickster through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Unique Jab: startup, impact, recovery'
      4-6: 'running Spook Slap: run transition, impact, slide/recover'
      7-9: 'aerial/running Ownness Kick: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Egoist Appropriation keypose
      '14': B<A Spook Reversal keypose
      '15': B>J Ownness Dash keypose
      '16': BvJ Union of Egoists Domain keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize unique/ridiculous moves that break design rules
    rows:
      row1_frames_1_4: 'B>A Egoist Appropriation: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Spook Reversal: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B>J Ownness Dash: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Union of Egoists Domain: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
