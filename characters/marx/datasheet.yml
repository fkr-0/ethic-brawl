    crop: head-and-shoulders, three-quarter or side-facing toward opponent, no background clutter
    must_show:
    - face identity
    - primary costume collar/shoulder shape
    - one role-defining prop or VFX accent
    avoid:
    - full-body pose in portrait
    - text labels
    - busy scenery
    - excessive glow
  roster_card:
    display_name: Karl Marx
    role_line: pressure scaler
    mechanic_line: shockwaves, factory hazards, revolution buffs
    color_strip:
      primary: '#1B1B1D'
      secondary: '#B7B0A6'
      accent: '#D6C39A'
  ability_icons:
  - slot: B>A
    label: Manifesto Shockwave
    icon_read: 'simple silhouette icon for Manifesto Shockwave; use palette accent #D6C39A'
  - slot: BvA
    label: Factory Floor Hazard
    icon_read: 'simple silhouette icon for Factory Floor Hazard; use palette accent #D21F2B'
  - slot: B^J
    label: Red Banner Rise
    icon_read: 'simple silhouette icon for Red Banner Rise; use palette accent #666B70'
  - slot: BvJ
    label: Revolution Field
    icon_read: 'simple silhouette icon for Revolution Field; use palette accent #D86A28'
  hud_meter:
    name: Karl Marx role meter
    fill_color: '#D6C39A'
