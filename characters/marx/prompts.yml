version: 2
character_id: marx
title: Karl Marx
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Karl Marx.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Karl Marx — The Revolutionary Pressure Engine; role: pressure scaler; mechanic: shockwaves, factory hazards, revolution
  buffs.

  Biography/combat fantasy: Critic of capital and theorist of class struggle recast as a pressure scaler. Marx advances with manifesto shockwaves,
  factory-floor hazards, and collective red-banner momentum that grows more threatening the longer he controls space.

  Appearance: large iconic beard, heavy brow, dark coat, red scarf or sash, rolled manuscript, sturdy boots, factory soot edges, red banner fragments
  and gear silhouettes.

  Palette: coat black #1B1B1D, beard gray #B7B0A6, manuscript tan #D6C39A, revolution red #D21F2B, factory iron #666B70, ember orange #D86A28.

  Animation identity: heavy lecturing idle with manuscript hand, trudging worker march walk, pressure-forward run, weighty jump, crossed-arm red
  guard, banner-raised victory.

  Normals: Manifesto Jab: rolled paper straight punch, small red paper spark, pressure starter; Dialectic Hook: broad coat-and-beard hook, red/iron
  crescent, mid pressure; Factory Stomp: heavy boot stomp, soot and gear spark, grounded ender

  Specials: B>A Manifesto Shockwave: startup unrolls manifesto with red flash, active forward shout/palm sends red ground shockwave, impact paper-and-soot
  wave rolls low, recovery manuscript snaps back; BvA Factory Floor Hazard: startup stomps boot into floor, active iron gear hazard sparks under
  opponent lane, impact low factory plate glows red-orange, recovery steps forward through soot; B^J Red Banner Rise: startup grips invisible
  banner pole low, active red banner surges upward behind body, impact banner lift buff pulse rises vertically, recovery banner folds into scarf;
  BvJ Revolution Field: startup raises fist and manifesto, active large red circular field spreads at feet, impact gear silhouettes and banner
  motes pulse, recovery stands in collective momentum aura'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'coat black #1B1B1D, beard gray #B7B0A6, manuscript tan #D6C39A, revolution red #D21F2B, factory iron #666B70, ember orange #D86A28'
appearance_bible: large iconic beard, heavy brow, dark coat, red scarf or sash, rolled manuscript, sturdy boots, factory soot edges, red banner
  fragments and gear silhouettes
animation_bible: heavy lecturing idle with manuscript hand, trudging worker march walk, pressure-forward run, weighty jump, crossed-arm red guard,
  banner-raised victory
move_render_descriptions:
  normal_moves:
  - name: Manifesto Jab
    pose: rolled paper straight punch
    vfx: small red paper spark
    gameplay: pressure starter
  - name: Dialectic Hook
    pose: broad coat-and-beard hook
    vfx: red/iron crescent
    gameplay: mid pressure
  - name: Factory Stomp
    pose: heavy boot stomp
    vfx: soot and gear spark
    gameplay: grounded ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Manifesto Shockwave
    startup: unrolls manifesto with red flash
    active: forward shout/palm sends red ground shockwave
    impact: paper-and-soot wave rolls low
    recovery: manuscript snaps back
  - command: BvA
    commandSlot: BDA
    name: Factory Floor Hazard
    startup: stomps boot into floor
    active: iron gear hazard sparks under opponent lane
    impact: low factory plate glows red-orange
    recovery: steps forward through soot
  - command: B^J
    commandSlot: BUJ
    name: Red Banner Rise
    startup: grips invisible banner pole low
    active: red banner surges upward behind body
    impact: banner lift buff pulse rises vertically
    recovery: banner folds into scarf
  - command: BvJ
    commandSlot: BDJ
    name: Revolution Field
    startup: raises fist and manifesto
    active: large red circular field spreads at feet
