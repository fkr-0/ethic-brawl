id: kierkegaard
title: Søren Kierkegaard
subtitle: The Knight of Faith
role: risk / leap specialist
element_mechanic: anxiety pools, faith leaps
source_notes:
- fully spriteless prompt-first; no source sheet found
full_biography:
  summary: 'Danish existential writer recast as a risk/leap specialist. Kierkegaard weaponizes anxiety, irony, and the impossible leap: hesitant
    in posture, sudden in commitment, fragile unless faith carries him through.'
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 8
    strength: 4
    agility: 8
    vitality: 5
    energy: 9
appearance_bible:
  appearance: melancholy dandy silhouette, swept hair, long dark coat, high collar, narrow trousers, walking cane or small book, ink-blue anxiety
    pools and white-gold faith sparks
  palette: 'copenhagen black #171820, coat blue #202A44, paper cream #E5D8BA, anxiety ink #263B8F, faith gold #F3D66B, irony pink #C85C9E'
  motion: nervous fidget idle, hesitant walk, sudden leap-run, dramatic airborne faith arc, cane/book guarded block, relieved hand-to-heart victory
  items: folded letter / reads Either-Or page / cane swing
move_render_descriptions:
  normal_moves:
  - name: Irony Jab
    pose: small hesitant cane poke that commits late
    vfx: pink irony tick
    gameplay: tricky opener
  - name: Anxiety Cut
    pose: quick diagonal coat-and-cane slash
    vfx: ink-blue smear
    gameplay: risk pressure
  - name: Faith Heel
    pose: sudden committed leap kick
    vfx: gold spark at foot
    gameplay: leap ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Leap-of-Faith Strike
    startup: hesitates with cane/book close
    active: sudden forward faith-lit strike
    impact: gold spark at committed impact
    recovery: lands fragile but resolved
  - command: B^A
    commandSlot: BUA
    name: Either/Or Upper
    startup: two ghosted choices split around him
    active: chooses upward cane/book uppercut
    impact: blue-pink fork collapses into hit
    recovery: recovers with hand to chest
  - command: B>J
    commandSlot: BFJ
    name: Faith Dash
    startup: low anxious crouch
    active: white-gold dash leap forward
    impact: body crosses a small abyss gap inside cell
    recovery: lands in resolved stance
  - command: BvJ
    commandSlot: BDJ
    name: Knight of Faith
    startup: anxiety pool forms under shoes
    active: gold light rises through dark pool
    impact: protective faith aura stabilizes body
    recovery: aura fades to trembling calm
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
