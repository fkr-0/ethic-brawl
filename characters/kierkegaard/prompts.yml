    recovery: aura fades to trembling calm
grids:
- id: kierkegaard_grid01_movement
  output: characters/kierkegaard/sprites/kierkegaard_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: nervous fidget idle, hesitant walk, sudden leap-run, dramatic airborne faith arc, cane/book guarded block, relieved
    hand-to-heart victory. 2 idle B tiny alternate breath/weight shift. 3 light hurt contained recoil. 4 heavy hurt stronger recoil but identity
    intact. 5-8 walk cycle with four distinct foot phases and prop/costume lag. 9-12 run cycle: acceleration, longest stride, pass step, push-off.
    13 vertical jump takeoff. 14 jump in air. 15 running jump arc. 16 K.O. full body visible. Keep prop/costume readable in every frame; no duplicate
    silhouettes; no cross-cell trails.'
- id: kierkegaard_grid02_fighting
  output: characters/kierkegaard/sprites/kierkegaard_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Irony Jab startup: small hesitant cane poke that commits late. 2 Irony Jab impact: pink irony tick. 3 recovery. 4 Anxiety
    Cut running startup: quick diagonal coat-and-cane slash. 5 impact: ink-blue smear. 6 slide/recovery. 7 aerial/running startup for Faith Heel.
    8 aerial impact: sudden committed leap kick, gold spark at foot. 9 landing recovery. 10 running evasion/block start. 11 character-specific
    guarded block. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must
    show anticipation, active, recovery.'
- id: kierkegaard_grid03_throws_consumes_swings
  output: characters/kierkegaard/sprites/kierkegaard_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: folded letter / reads Either-Or page / cane swing. 2 throw windup. 3 throw release.
    4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup. 10 swing impact. 11 swing
    follow-through. 12 reset. 13 B>A Leap-of-Faith Strike keypose: sudden forward faith-lit strike / gold spark at committed impact. 14 B^A Either/Or
    Upper keypose: chooses upward cane/book uppercut / blue-pink fork collapses into hit. 15 B>J Faith Dash keypose: white-gold dash leap forward
    / body crosses a small abyss gap inside cell. 16 BvJ Knight of Faith keypose: gold light rises through dark pool / protective faith aura stabilizes
    body. Compact VFX only; caster silhouette first.'
- id: kierkegaard_grid04_specials
  output: characters/kierkegaard/sprites/kierkegaard_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Leap-of-Faith Strike, B>A: 1 startup hesitates with cane/book close; 2 active sudden forward faith-lit strike; 3 impact/sustain gold
    spark at committed impact; 4 recovery lands fragile but resolved.

    Row 2, Either/Or Upper, B^A: 5 startup two ghosted choices split around him; 6 active chooses upward cane/book uppercut; 7 impact/sustain
    blue-pink fork collapses into hit; 8 recovery recovers with hand to chest.

    Row 3, Faith Dash, B>J: 9 startup low anxious crouch; 10 active white-gold dash leap forward; 11 impact/sustain body crosses a small abyss
    gap inside cell; 12 recovery lands in resolved stance.

    Row 4, Knight of Faith, BvJ: 13 startup anxiety pool forms under shoes; 14 active gold light rises through dark pool; 15 impact/sustain protective
    faith aura stabilizes body; 16 recovery aura fades to trembling calm.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: melancholy dandy silhouette, swept hair, long dark coat, high collar, narrow trousers, walking cane or small book, ink-blue
      anxiety pools and white-gold faith sparks
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: anxiety pools, faith leaps; VFX must stay behind or around the silhouette unless it is the impact
      frame'
  palette_budget:
    primary: '#171820'
    secondary: '#202A44'
    accent: '#E5D8BA'
    vfx_1: '#263B8F'
    vfx_2: '#F3D66B'
    shadow: '#C85C9E'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Søren Kierkegaard as risk / leap specialist through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Irony Jab: startup, impact, recovery'
      4-6: 'running Anxiety Cut: run transition, impact, slide/recover'
      7-9: 'aerial/running Faith Heel: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Leap-of-Faith Strike keypose
      '14': B^A Either/Or Upper keypose
      '15': B>J Faith Dash keypose
      '16': BvJ Knight of Faith keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize anxiety pools, faith leaps
    rows:
      row1_frames_1_4: 'B>A Leap-of-Faith Strike: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B^A Either/Or Upper: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'B>J Faith Dash: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Knight of Faith: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
