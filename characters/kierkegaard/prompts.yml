version: 2
character_id: kierkegaard
title: Søren Kierkegaard
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Søren Kierkegaard.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Søren Kierkegaard — The Knight of Faith; role: risk / leap specialist; mechanic: anxiety pools, faith leaps.

  Biography/combat fantasy: Danish existential writer recast as a risk/leap specialist. Kierkegaard weaponizes anxiety, irony, and the impossible
  leap: hesitant in posture, sudden in commitment, fragile unless faith carries him through.

  Appearance: melancholy dandy silhouette, swept hair, long dark coat, high collar, narrow trousers, walking cane or small book, ink-blue anxiety
  pools and white-gold faith sparks.

  Palette: copenhagen black #171820, coat blue #202A44, paper cream #E5D8BA, anxiety ink #263B8F, faith gold #F3D66B, irony pink #C85C9E.

  Animation identity: nervous fidget idle, hesitant walk, sudden leap-run, dramatic airborne faith arc, cane/book guarded block, relieved hand-to-heart
  victory.

  Normals: Irony Jab: small hesitant cane poke that commits late, pink irony tick, tricky opener; Anxiety Cut: quick diagonal coat-and-cane slash,
  ink-blue smear, risk pressure; Faith Heel: sudden committed leap kick, gold spark at foot, leap ender

  Specials: B>A Leap-of-Faith Strike: startup hesitates with cane/book close, active sudden forward faith-lit strike, impact gold spark at committed
  impact, recovery lands fragile but resolved; B^A Either/Or Upper: startup two ghosted choices split around him, active chooses upward cane/book
  uppercut, impact blue-pink fork collapses into hit, recovery recovers with hand to chest; B>J Faith Dash: startup low anxious crouch, active
  white-gold dash leap forward, impact body crosses a small abyss gap inside cell, recovery lands in resolved stance; BvJ Knight of Faith: startup
  anxiety pool forms under shoes, active gold light rises through dark pool, impact protective faith aura stabilizes body, recovery aura fades
  to trembling calm'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'copenhagen black #171820, coat blue #202A44, paper cream #E5D8BA, anxiety ink #263B8F, faith gold #F3D66B, irony pink #C85C9E'
appearance_bible: melancholy dandy silhouette, swept hair, long dark coat, high collar, narrow trousers, walking cane or small book, ink-blue
  anxiety pools and white-gold faith sparks
animation_bible: nervous fidget idle, hesitant walk, sudden leap-run, dramatic airborne faith arc, cane/book guarded block, relieved hand-to-heart
  victory
move_render_descriptions:
  normal_moves:
  - name: Irony Jab
    pose: small hesitant cane poke that commits late
    vfx: pink irony tick
    gameplay: tricky opener
  - name: Anxiety Cut
    pose: quick diagonal coat-and-cane slash
    vfx: ink-blue smear
    gameplay: risk pressure
  - name: Faith Heel
    pose: sudden committed leap kick
    vfx: gold spark at foot
    gameplay: leap ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Leap-of-Faith Strike
    startup: hesitates with cane/book close
    active: sudden forward faith-lit strike
    impact: gold spark at committed impact
    recovery: lands fragile but resolved
  - command: B^A
    commandSlot: BUA
    name: Either/Or Upper
    startup: two ghosted choices split around him
    active: chooses upward cane/book uppercut
    impact: blue-pink fork collapses into hit
    recovery: recovers with hand to chest
  - command: B>J
    commandSlot: BFJ
    name: Faith Dash
    startup: low anxious crouch
    active: white-gold dash leap forward
    impact: body crosses a small abyss gap inside cell
    recovery: lands in resolved stance
  - command: BvJ
    commandSlot: BDJ
    name: Knight of Faith
    startup: anxiety pool forms under shoes
    active: gold light rises through dark pool
