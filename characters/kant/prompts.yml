version: 2
character_id: kant
title: Immanuel Kant
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Immanuel Kant.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Immanuel Kant — The Categorical Lawgiver; role: lawful control mage; mechanic: beams, constraints, reflective duty.

  Biography/combat fantasy: Prussian critical philosopher recast as a lawful control mage. Kant constrains motion with duty sigils, reflects phenomena
  at the noumenal boundary, and fires universal law as clean geometric beams.

  Appearance: small precise professor silhouette, powdered wig or tied white hair, dark Prussian coat, waistcoat, cane or book, starry-heavens
  lining and law-sigil geometry.

  Palette: prussian navy #17223B, wig white #E7E4DA, waistcoat gray #8A8F99, duty gold #DAB85C, noumenal violet #6E5BFF, law blue #4FA3FF.

  Animation identity: clockwork idle, tiny exact walk, stiff controlled run, small precise jump, reflective book/cane block, starry-heavens victory
  glance.

  Normals: Maxim Jab: small exact cane poke, blue law tick, precise opener; Duty Palm: rigid palm/book push, gold constraint bracket, control
  pressure; Sublime Kick: stiff upward kick with coat flare, violet star spark, anti-air ender

  Specials: B>A Universal Law Beam: startup cane/book aligns with perfect posture, active straight law-blue beam fires forward, impact gold duty
  brackets frame beam, recovery returns to clockwork stance; B<A Noumenal Reflect: startup book closes over chest, active violet reflective plane
  appears, impact incoming force bends off invisible boundary, recovery plane folds into book; BvA Duty Sigil: startup sets cane tip to floor,
  active gold duty sigil appears under target lane, impact constraint lines lock low space, recovery cane lifts precisely; BvJ Kingdom of Ends:
  startup raises book toward starry lining, active blue-gold moral geometry field expands, impact starry duty nodes orbit once, recovery field
  resolves into calm stance'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'prussian navy #17223B, wig white #E7E4DA, waistcoat gray #8A8F99, duty gold #DAB85C, noumenal violet #6E5BFF, law blue #4FA3FF'
appearance_bible: small precise professor silhouette, powdered wig or tied white hair, dark Prussian coat, waistcoat, cane or book, starry-heavens
  lining and law-sigil geometry
animation_bible: clockwork idle, tiny exact walk, stiff controlled run, small precise jump, reflective book/cane block, starry-heavens victory
  glance
move_render_descriptions:
  normal_moves:
  - name: Maxim Jab
    pose: small exact cane poke
    vfx: blue law tick
    gameplay: precise opener
  - name: Duty Palm
    pose: rigid palm/book push
    vfx: gold constraint bracket
    gameplay: control pressure
  - name: Sublime Kick
    pose: stiff upward kick with coat flare
    vfx: violet star spark
    gameplay: anti-air ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Universal Law Beam
    startup: cane/book aligns with perfect posture
    active: straight law-blue beam fires forward
    impact: gold duty brackets frame beam
    recovery: returns to clockwork stance
  - command: B<A
    commandSlot: BBA
    name: Noumenal Reflect
    startup: book closes over chest
    active: violet reflective plane appears
    impact: incoming force bends off invisible boundary
    recovery: plane folds into book
  - command: BvA
    commandSlot: BDA
    name: Duty Sigil
    startup: sets cane tip to floor
    active: gold duty sigil appears under target lane
    impact: constraint lines lock low space
    recovery: cane lifts precisely
  - command: BvJ
    commandSlot: BDJ
    name: Kingdom of Ends
    startup: raises book toward starry lining
    active: blue-gold moral geometry field expands
    impact: starry duty nodes orbit once
    recovery: field resolves into calm stance
grids:
- id: kant_grid01_movement
  output: characters/kant/sprites/kant_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: clockwork idle, tiny exact walk, stiff controlled run, small precise jump, reflective book/cane block, starry-heavens
    victory glance. 2 idle B tiny alternate breath/weight shift. 3 light hurt contained recoil. 4 heavy hurt stronger recoil but identity intact.
    5-8 walk cycle with four distinct foot phases and prop/costume lag. 9-12 run cycle: acceleration, longest stride, pass step, push-off. 13
    vertical jump takeoff. 14 jump in air. 15 running jump arc. 16 K.O. full body visible. Keep prop/costume readable in every frame; no duplicate
    silhouettes; no cross-cell trails.'
- id: kant_grid02_fighting
  output: characters/kant/sprites/kant_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Maxim Jab startup: small exact cane poke. 2 Maxim Jab impact: blue law tick. 3 recovery. 4 Duty Palm running startup:
    rigid palm/book push. 5 impact: gold constraint bracket. 6 slide/recovery. 7 aerial/running startup for Sublime Kick. 8 aerial impact: stiff
    upward kick with coat flare, violet star spark. 9 landing recovery. 10 running evasion/block start. 11 character-specific guarded block. 12
    punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must show anticipation,
    active, recovery.'
- id: kant_grid03_throws_consumes_swings
  output: characters/kant/sprites/kant_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: pocket watch or book page / adjusts watch or reads critique / cane-law sweep. 2 throw
    windup. 3 throw release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup.
    10 swing impact. 11 swing follow-through. 12 reset. 13 B>A Universal Law Beam keypose: straight law-blue beam fires forward / gold duty brackets
    frame beam. 14 B<A Noumenal Reflect keypose: violet reflective plane appears / incoming force bends off invisible boundary. 15 BvA Duty Sigil
    keypose: gold duty sigil appears under target lane / constraint lines lock low space. 16 BvJ Kingdom of Ends keypose: blue-gold moral geometry
    field expands / starry duty nodes orbit once. Compact VFX only; caster silhouette first.'
- id: kant_grid04_specials
  output: characters/kant/sprites/kant_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Universal Law Beam, B>A: 1 startup cane/book aligns with perfect posture; 2 active straight law-blue beam fires forward; 3 impact/sustain
    gold duty brackets frame beam; 4 recovery returns to clockwork stance.

    Row 2, Noumenal Reflect, B<A: 5 startup book closes over chest; 6 active violet reflective plane appears; 7 impact/sustain incoming force
    bends off invisible boundary; 8 recovery plane folds into book.

    Row 3, Duty Sigil, BvA: 9 startup sets cane tip to floor; 10 active gold duty sigil appears under target lane; 11 impact/sustain constraint
    lines lock low space; 12 recovery cane lifts precisely.

    Row 4, Kingdom of Ends, BvJ: 13 startup raises book toward starry lining; 14 active blue-gold moral geometry field expands; 15 impact/sustain
    starry duty nodes orbit once; 16 recovery field resolves into calm stance.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: small precise professor silhouette, powdered wig or tied white hair, dark Prussian coat, waistcoat, cane or book, starry-heavens
      lining and law-sigil geometry
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: beams, constraints, reflective duty; VFX must stay behind or around the silhouette unless it
      is the impact frame'
  palette_budget:
    primary: '#17223B'
    secondary: '#E7E4DA'
    accent: '#8A8F99'
    vfx_1: '#DAB85C'
    vfx_2: '#6E5BFF'
    shadow: '#4FA3FF'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Immanuel Kant as lawful control mage through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Maxim Jab: startup, impact, recovery'
      4-6: 'running Duty Palm: run transition, impact, slide/recover'
      7-9: 'aerial/running Sublime Kick: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Universal Law Beam keypose
      '14': B<A Noumenal Reflect keypose
      '15': BvA Duty Sigil keypose
      '16': BvJ Kingdom of Ends keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize beams, constraints, reflective duty
    rows:
      row1_frames_1_4: 'B>A Universal Law Beam: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Noumenal Reflect: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'BvA Duty Sigil: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ Kingdom of Ends: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
