version: 2
character_id: socrates
title: Socrates
purpose: Highly distinctive feasible 4x4 sprite-grid prompts for spriteless/prompt-first characters.
common_prompt_prefix: 'Create a production-ready pixel-art sprite sheet for ETHIC BRAWL: Socrates.

  Output EXACTLY one image arranged as a perfect 4x4 grid, 16 frames total, read left-to-right and top-to-bottom. Every cell must be same size,
  perfectly aligned, no gutters, no margins, no border, no labels, no text. Use true alpha transparency only. Keep the same character identity,
  costume, palette, scale, side-view camera, lighting, and pixel density in all 16 cells. Right-facing side-view fighter poses unless explicitly
  stated. Full body inside every cell. Crisp readable 2D arcade pixel art, limited palette, strong silhouette. Compact VFX secondary to body pose
  clarity.'
character_sprite_brief: 'Socrates — The Gadfly Questioner; role: question/counter trickster; mechanic: reflection, stun, dialogue trap.

  Biography/combat fantasy: Athenian gadfly recast as a question/counter trickster. Socrates wins by making the opponent answer: he reflects certainty,
  stuns with elenchus, traps the arena as an agora, and backs away with infuriating calm.

  Appearance: balding head, pug nose, short beard, simple white himation/tunic, bare feet or sandals, small cup and scroll, warm ironic smile,
  dialogue-ring VFX without readable text.

  Palette: linen white #E9E0CA, skin bronze #B9855A, scroll tan #D1B276, hemlock green #6FAE5F, agora gold #E2B84D, question blue #57A6FF.

  Animation identity: barefoot questioning idle, casual walk, nimble conversational shuffle run, compact hop, open-palm reflective block, shrugging
  victory.

  Normals: Gadfly Jab: annoying open-finger poke, tiny blue question spark, poke starter; Elenchus Palm: open palm presses forward, gold-blue
  dialogue ring, stun pressure; Agora Trip: barefoot low sweep, dust and question spark, trick ender

  Specials: B>A Elenchus Bolt: startup raises one questioning finger, active small blue-gold bolt shoots from fingertip, impact stun spark pops
  like a dialogue bubble without text, recovery finger lowers with smirk; B<A Question Reversal: startup leans in as if inviting an answer, active
  open palm mirror catches attack, impact reversal flash bends back toward opponent, recovery shrugs into stance; BvA Agora Trap: startup taps
  ground with bare foot, active small circular debate mark appears on floor, impact trap glows gold-blue and waits, recovery hands open in invitation;
  B<J Apology Backstep: startup steps back with cup/scroll close, active slips backward under a faint dialogue arc, impact afterimage shrugs in
  place, recovery settles calm and irritating'
negative_prompt: blurry, painterly, 3d render, realistic photo, watercolor, vector smooth shading, multiple characters unless the character is
  explicitly a duo-as-one silhouette, busy background, non-transparent background, checkerboard background, text, letters, labels, captions, speech
  bubbles, UI elements, watermark, logo, uneven grid, broken grid, offset cells, inconsistent cell sizes, cropped limbs, cut-off feet, motion
  trails crossing cell boundaries, duplicate frames, heavy glow, bloom, soft shadow halos, anti-aliased fringe, costume changes, face changes,
  weapon changes, prop disappears, unreadable silhouette
palette_anchors: 'linen white #E9E0CA, skin bronze #B9855A, scroll tan #D1B276, hemlock green #6FAE5F, agora gold #E2B84D, question blue #57A6FF'
appearance_bible: balding head, pug nose, short beard, simple white himation/tunic, bare feet or sandals, small cup and scroll, warm ironic smile,
  dialogue-ring VFX without readable text
animation_bible: barefoot questioning idle, casual walk, nimble conversational shuffle run, compact hop, open-palm reflective block, shrugging
  victory
move_render_descriptions:
  normal_moves:
  - name: Gadfly Jab
    pose: annoying open-finger poke
    vfx: tiny blue question spark
    gameplay: poke starter
  - name: Elenchus Palm
    pose: open palm presses forward
    vfx: gold-blue dialogue ring
    gameplay: stun pressure
  - name: Agora Trip
    pose: barefoot low sweep
    vfx: dust and question spark
    gameplay: trick ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Elenchus Bolt
    startup: raises one questioning finger
    active: small blue-gold bolt shoots from fingertip
    impact: stun spark pops like a dialogue bubble without text
    recovery: finger lowers with smirk
  - command: B<A
    commandSlot: BBA
    name: Question Reversal
    startup: leans in as if inviting an answer
    active: open palm mirror catches attack
    impact: reversal flash bends back toward opponent
    recovery: shrugs into stance
  - command: BvA
    commandSlot: BDA
    name: Agora Trap
    startup: taps ground with bare foot
    active: small circular debate mark appears on floor
    impact: trap glows gold-blue and waits
    recovery: hands open in invitation
  - command: B<J
    commandSlot: BBJ
    name: Apology Backstep
    startup: steps back with cup/scroll close
    active: slips backward under a faint dialogue arc
    impact: afterimage shrugs in place
    recovery: settles calm and irritating
grids:
- id: socrates_grid01_movement
  output: characters/socrates/sprites/socrates_grid01_movement.png
  role: Basic Movement Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 01 MOVEMENT. 1 idle A: barefoot questioning idle, casual walk, nimble conversational shuffle run, compact hop, open-palm reflective block,
    shrugging victory. 2 idle B tiny alternate breath/weight shift. 3 light hurt contained recoil. 4 heavy hurt stronger recoil but identity intact.
    5-8 walk cycle with four distinct foot phases and prop/costume lag. 9-12 run cycle: acceleration, longest stride, pass step, push-off. 13
    vertical jump takeoff. 14 jump in air. 15 running jump arc. 16 K.O. full body visible. Keep prop/costume readable in every frame; no duplicate
    silhouettes; no cross-cell trails.'
- id: socrates_grid02_fighting
  output: characters/socrates/sprites/socrates_grid02_fighting.png
  role: Basic Fighting Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 02 FIGHTING. 1 Gadfly Jab startup: annoying open-finger poke. 2 Gadfly Jab impact: tiny blue question spark. 3 recovery. 4 Elenchus Palm
    running startup: open palm presses forward. 5 impact: gold-blue dialogue ring. 6 slide/recovery. 7 aerial/running startup for Agora Trip.
    8 aerial impact: barefoot low sweep, dust and question spark. 9 landing recovery. 10 running evasion/block start. 11 character-specific guarded
    block. 12 punish-ready exit. 13 basic block. 14 fortified block. 15 victory pose A. 16 iconic victory pose B. Each 3-frame clip must show
    anticipation, active, recovery.'
- id: socrates_grid03_throws_consumes_swings
  output: characters/socrates/sprites/socrates_grid03_throws_consumes_swings.png
  role: Throwing / Consuming / Swinging Motions + Character Combos
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 03 INTERACTION AND COMBO KEYS. 1 pickup/ready item: small cup or pebble / cup sip feint / scroll-hand sweep. 2 throw windup. 3 throw
    release. 4 throw recovery. 5 consume/use start. 6 consume/use active. 7 small effect glint. 8 return stance. 9 swing startup. 10 swing impact.
    11 swing follow-through. 12 reset. 13 B>A Elenchus Bolt keypose: small blue-gold bolt shoots from fingertip / stun spark pops like a dialogue
    bubble without text. 14 B<A Question Reversal keypose: open palm mirror catches attack / reversal flash bends back toward opponent. 15 BvA
    Agora Trap keypose: small circular debate mark appears on floor / trap glows gold-blue and waits. 16 B<J Apology Backstep keypose: slips backward
    under a faint dialogue arc / afterimage shrugs in place. Compact VFX only; caster silhouette first.'
- id: socrates_grid04_specials
  output: characters/socrates/sprites/socrates_grid04_specials.png
  role: Specials Prompt
  prompt: '{{common_prompt_prefix}}

    {{character_sprite_brief}}


    GRID 04 SPECIALS, four moves, one row per move.

    Row 1, Elenchus Bolt, B>A: 1 startup raises one questioning finger; 2 active small blue-gold bolt shoots from fingertip; 3 impact/sustain
    stun spark pops like a dialogue bubble without text; 4 recovery finger lowers with smirk.

    Row 2, Question Reversal, B<A: 5 startup leans in as if inviting an answer; 6 active open palm mirror catches attack; 7 impact/sustain reversal
    flash bends back toward opponent; 8 recovery shrugs into stance.

    Row 3, Agora Trap, BvA: 9 startup taps ground with bare foot; 10 active small circular debate mark appears on floor; 11 impact/sustain trap
    glows gold-blue and waits; 12 recovery hands open in invitation.

    Row 4, Apology Backstep, B<J: 13 startup steps back with cup/scroll close; 14 active slips backward under a faint dialogue arc; 15 impact/sustain
    afterimage shrugs in place; 16 recovery settles calm and irritating.

    Each row is a separate 4-frame caster animation; no row blending; VFX stays inside cell and never hides the body.'
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: balding head, pug nose, short beard, simple white himation/tunic, bare feet or sandals, small cup and scroll, warm ironic smile,
      dialogue-ring VFX without readable text
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: reflection, stun, dialogue trap; VFX must stay behind or around the silhouette unless it is the
      impact frame'
  palette_budget:
    primary: '#E9E0CA'
    secondary: '#B9855A'
    accent: '#D1B276'
    vfx_1: '#6FAE5F'
    vfx_2: '#E2B84D'
    shadow: '#57A6FF'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Socrates as question/counter trickster through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Gadfly Jab: startup, impact, recovery'
      4-6: 'running Elenchus Palm: run transition, impact, slide/recover'
      7-9: 'aerial/running Agora Trip: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Elenchus Bolt keypose
      '14': B<A Question Reversal keypose
      '15': BvA Agora Trap keypose
      '16': B<J Apology Backstep keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize reflection, stun, dialogue trap
    rows:
      row1_frames_1_4: 'B>A Elenchus Bolt: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Question Reversal: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'BvA Agora Trap: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'B<J Apology Backstep: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
