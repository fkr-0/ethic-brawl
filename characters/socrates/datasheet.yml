version: 1
enhancement_version: 2
id: socrates
title: Socrates
subtitle: The Gadfly Questioner
role: question/counter trickster
element_mechanic: reflection, stun, dialogue trap
source_notes:
- prompt-first with roster placeholder source sheet
full_biography:
  summary: 'Athenian gadfly recast as a question/counter trickster. Socrates wins by making the opponent answer: he reflects certainty, stuns
    with elenchus, traps the arena as an agora, and backs away with infuriating calm.'
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 9
    strength: 4
    agility: 6
    vitality: 7
    energy: 8
appearance_bible:
  appearance: balding head, pug nose, short beard, simple white himation/tunic, bare feet or sandals, small cup and scroll, warm ironic smile,
    dialogue-ring VFX without readable text
  palette: 'linen white #E9E0CA, skin bronze #B9855A, scroll tan #D1B276, hemlock green #6FAE5F, agora gold #E2B84D, question blue #57A6FF'
  motion: barefoot questioning idle, casual walk, nimble conversational shuffle run, compact hop, open-palm reflective block, shrugging victory
  items: small cup or pebble / cup sip feint / scroll-hand sweep
move_render_descriptions:
  normal_moves:
  - name: Gadfly Jab
    pose: annoying open-finger poke
    vfx: tiny blue question spark
    gameplay: poke starter
  - name: Elenchus Palm
    pose: open palm presses forward
    vfx: gold-blue dialogue ring
    gameplay: stun pressure
  - name: Agora Trip
    pose: barefoot low sweep
    vfx: dust and question spark
    gameplay: trick ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Elenchus Bolt
    startup: raises one questioning finger
    active: small blue-gold bolt shoots from fingertip
    impact: stun spark pops like a dialogue bubble without text
    recovery: finger lowers with smirk
  - command: B<A
    commandSlot: BBA
    name: Question Reversal
    startup: leans in as if inviting an answer
    active: open palm mirror catches attack
    impact: reversal flash bends back toward opponent
    recovery: shrugs into stance
  - command: BvA
    commandSlot: BDA
    name: Agora Trap
    startup: taps ground with bare foot
    active: small circular debate mark appears on floor
    impact: trap glows gold-blue and waits
    recovery: hands open in invitation
  - command: B<J
    commandSlot: BBJ
    name: Apology Backstep
    startup: steps back with cup/scroll close
    active: slips backward under a faint dialogue arc
    impact: afterimage shrugs in place
    recovery: settles calm and irritating
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
sprite_outputs:
  source_references:
  - assets/sprites/roster/socrates/source/socrates_core_4x4.png
  - assets/sprites/roster/socrates/source/socrates_extended_4x4.png
  authored_prompt_pack: characters/socrates/prompts.yml
  target_sheets:
    movement: characters/socrates/sprites/socrates_grid01_movement.png
    fighting: characters/socrates/sprites/socrates_grid02_fighting.png
    throws_consumes_swings: characters/socrates/sprites/socrates_grid03_throws_consumes_swings.png
    specials: characters/socrates/sprites/socrates_grid04_specials.png
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: balding head, pug nose, short beard, simple white himation/tunic, bare feet or sandals, small cup and scroll, warm ironic smile,
      dialogue-ring VFX without readable text
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: reflection, stun, dialogue trap; VFX must stay behind or around the silhouette unless it is the
      impact frame'
  palette_budget:
    primary: '#E9E0CA'
    secondary: '#B9855A'
    accent: '#D1B276'
    vfx_1: '#6FAE5F'
    vfx_2: '#E2B84D'
    shadow: '#57A6FF'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Socrates as question/counter trickster through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Gadfly Jab: startup, impact, recovery'
      4-6: 'running Elenchus Palm: run transition, impact, slide/recover'
      7-9: 'aerial/running Agora Trip: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Elenchus Bolt keypose
      '14': B<A Question Reversal keypose
      '15': BvA Agora Trap keypose
      '16': B<J Apology Backstep keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize reflection, stun, dialogue trap
    rows:
      row1_frames_1_4: 'B>A Elenchus Bolt: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Question Reversal: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'BvA Agora Trap: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'B<J Apology Backstep: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
ui_sprite_details:
  portrait_requirements:
    crop: head-and-shoulders, three-quarter or side-facing toward opponent, no background clutter
    must_show:
    - face identity
    - primary costume collar/shoulder shape
    - one role-defining prop or VFX accent
    avoid:
    - full-body pose in portrait
    - text labels
    - busy scenery
    - excessive glow
  roster_card:
    display_name: Socrates
    role_line: question/counter trickster
    mechanic_line: reflection, stun, dialogue trap
    color_strip:
      primary: '#E9E0CA'
      secondary: '#B9855A'
      accent: '#D1B276'
  ability_icons:
  - slot: B>A
    label: Elenchus Bolt
    icon_read: 'simple silhouette icon for Elenchus Bolt; use palette accent #D1B276'
  - slot: B<A
    label: Question Reversal
    icon_read: 'simple silhouette icon for Question Reversal; use palette accent #6FAE5F'
  - slot: BvA
    label: Agora Trap
    icon_read: 'simple silhouette icon for Agora Trap; use palette accent #E2B84D'
  - slot: B<J
    label: Apology Backstep
    icon_read: 'simple silhouette icon for Apology Backstep; use palette accent #57A6FF'
  hud_meter:
    name: Socrates role meter
    fill_color: '#D1B276'
    empty_color: '#E9E0CA'
    readability: must remain legible over dark and bright stages; avoid relying only on hue
  hit_spark_family:
    normal: '#B9855A'
    special: '#D1B276'
    counter_or_field: '#6FAE5F'
    rule: sparks should inherit character palette so screenshots identify the fighter even without portrait
production_checklist:
  asset_files_expected:
  - characters/socrates/sprites/socrates_grid01_movement.png
  - characters/socrates/sprites/socrates_grid02_fighting.png
  - characters/socrates/sprites/socrates_grid03_throws_consumes_swings.png
  - characters/socrates/sprites/socrates_grid04_specials.png
  validation:
  - image dimensions divisible by 4 in both axes
  - alpha background present and not replaced by checkerboard
  - 16 cells detected with equal width/height
  - grounded frames share a stable foot baseline
  - no text, labels, captions, UI, watermark, or speech bubbles inside the image
  - no limb/prop cropping at cell boundaries
  - character scale drift across cells less than roughly 10 percent
  runtime_binding:
    manifest: characters/socrates/sprite-grid-manifest.json
    prompt_pack: characters/socrates/prompts.yml
    placeholder_ok: true
    replace_placeholder_when: a final generated sheet passes validation and preserves clip ordering
  review_priority:
  - grid01 movement loop quality
  - grid02 attack readability
  - grid04 special VFX containment
  - UI portrait consistency
