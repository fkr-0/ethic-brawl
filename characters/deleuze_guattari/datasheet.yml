id: deleuze_guattari
title: Gilles Deleuze / Félix Guattari
subtitle: The Rhizome Engine
role: swarm / field chaos
element_mechanic: rhizome chains, assemblage cyclones
source_notes:
- spriteless prompt-first; root draft image exists but no atlas source directory
full_biography:
  summary: 'A duo reimagined as one playable assemblage: two thinkers expressed as a single unstable fighter silhouette of scarf, coat, masks,
    papers, and living rhizome lines. Their combat dissolves clean categories into swarms, chains, and fields of becoming.'
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 9
    strength: 4
    agility: 8
    vitality: 5
    energy: 9
appearance_bible:
  appearance: duo-as-one silhouette, one main body with a secondary shoulder-mask/echo rather than two independent characters, layered coats and
    scarves, wild hair outlines, notebooks, rhizome root-vines and machine-cog motes
  palette: 'ink black #15151A, paper cream #E7DCC4, rhizome green #39FF14, machine magenta #FF4DCC, plateau blue #4AA3FF, cyclone violet #6B4DFF'
  motion: restless double-beat idle, skittering sideways walk, line-of-flight dash run, scarf-and-root aerial shapes, tangled assemblage block,
    chaotic but readable victory swirl
  items: notebook scrap / machine-part spark use / scarf-rhizome lash swing
move_render_descriptions:
  normal_moves:
  - name: Concept Jab
    pose: two-beat asymmetrical jab from main hand and echo shoulder
    vfx: green rhizome tick
    gameplay: trick opener
  - name: Assemblage Sweep
    pose: scarf-and-root side sweep
    vfx: magenta-green arc
    gameplay: chaos pressure
  - name: Plateau Kick
    pose: rising knee with paper burst
    vfx: blue plateau spark
    gameplay: launcher-flavored ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Rhizome Lash
    startup: root-lines coil around the lead arm
    active: green chain lashes forward in one clear strand
    impact: small branching roots bite the floor
    recovery: root strand retracts into sleeve
  - command: B^A
    commandSlot: BUA
    name: Thousand Plateaus Rise
    startup: papers and roots gather under feet
    active: vertical layered platform/rhizome lift rises
    impact: blue-green staircase burst pops upward
    recovery: falls back into unstable stance
  - command: B>J
    commandSlot: BFJ
    name: Line-of-Flight Dash
    startup: body leans toward escape vector
    active: fast diagonal dash with scarf-root afterimage
    impact: magenta/green line cuts across cell
    recovery: reassembles as one fighter silhouette
  - command: BvJ
    commandSlot: BDJ
    name: Body-without-Organs Domain
    startup: silhouette loosens as root-cog motes orbit
    active: flat violet-green field spreads under feet
    impact: assemblage cyclone forms behind but body stays readable
    recovery: motes collapse into coat folds
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
