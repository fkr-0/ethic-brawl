  - slot: BvA
    label: Border Wall Field
    icon_read: 'simple silhouette icon for Border Wall Field; use palette accent #E8E8E8'
  - slot: BvJ
    label: State of Exception
    icon_read: 'simple silhouette icon for State of Exception; use palette accent #D6A536'
  hud_meter:
    name: Carl Schmitt role meter
