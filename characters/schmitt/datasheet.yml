version: 1
enhancement_version: 2
id: schmitt
title: Carl Schmitt
subtitle: The State of Exception
role: armored rule-breaker
element_mechanic: borders, beam authority, exception state
source_notes:
- prompt-first with roster placeholder source sheet
full_biography:
  summary: Jurist of sovereignty and exception recast as an armored rule-breaker. Schmitt defines borders, suspends ordinary rules, and advances
    behind hard rectangular authority effects.
  combat_read: Prompt-first spriteless character bible intended to guide high-consistency grid rendering.
stored_stats:
  proposed_prompt_stats:
    intelligence: 8
    strength: 7
    agility: 3
    vitality: 9
    energy: 7
appearance_bible:
  appearance: stern jurist face, slick hair, dark formal coat fused with angular armor plates, red legal sash, heavy boots, law tablet, hard border-wall
    VFX
  palette: 'legal black #111217, armor gray #50545C, decree parchment #C8B98C, authority red #B51624, border white #E8E8E8, emergency gold #D6A536'
  motion: rigid decree idle, heavy marching walk, armored emergency advance run, low heavy jump, rectangular border block, decree-raised victory
  items: legal seal / decree stamp use / tablet-edge swing
move_render_descriptions:
  normal_moves:
  - name: Decision Jab
    pose: short armored decree punch
    vfx: white border tick
    gameplay: solid opener
  - name: Jurist Crush
    pose: tablet forearm smash
    vfx: red authority slash
    gameplay: pressure hit
  - name: Border Kick
    pose: stiff boot through rectangle line
    vfx: gray-white wall crack
    gameplay: heavy ender
  special_moves:
  - command: B>A
    commandSlot: BFA
    name: Sovereign Beam
    startup: decree tablet rises to eye level
    active: straight red-white authority beam projects forward
    impact: beam has hard rectangular edges
    recovery: tablet lowers slowly
  - command: B<A
    commandSlot: BBA
    name: Exception Counter
    startup: arms cross behind border rectangle
    active: incoming force caught by emergency frame
    impact: red counter judgment flash
    recovery: returns armored and stern
  - command: BvA
    commandSlot: BDA
    name: Border Wall Field
    startup: stamps boot and tablet downward
    active: low rectangular wall rises from floor
    impact: white-gray border blocks space
    recovery: wall fades like closing law book
  - command: BvJ
    commandSlot: BDJ
    name: State of Exception
    startup: raises decree overhead
    active: red-gold emergency aura overrides grid
    impact: hard borders pulse around body
    recovery: aura contracts into armor plates
prompt_feasibility_notes:
- one exact 4x4 sheet per prompt
- one pose per frame
- compact VFX secondary to silhouette
- no labels or readable text inside image
- stable costume/palette across all cells
sprite_outputs:
  source_references:
  - assets/sprites/roster/schmitt/source/schmitt_core_4x4.png
  - assets/sprites/roster/schmitt/source/schmitt_extended_4x4.png
  authored_prompt_pack: characters/schmitt/prompts.yml
  target_sheets:
    movement: characters/schmitt/sprites/schmitt_grid01_movement.png
    fighting: characters/schmitt/sprites/schmitt_grid02_fighting.png
    throws_consumes_swings: characters/schmitt/sprites/schmitt_grid03_throws_consumes_swings.png
    specials: characters/schmitt/sprites/schmitt_grid04_specials.png
asset_detail_audit_version: 1
sprite_texture_bible:
  sheet_contract:
    format: single 4x4 RGBA sprite sheet per grid
    cell_count: 16
    background: true alpha transparency only; no checkerboard; no scenery
    camera: orthographic side-view fighting-game camera, consistent ground baseline
    pixel_density: crisp pixel-art edges; avoid painterly gradients and anti-aliased glow fringes
    silhouette_rule: full body stays inside every cell; primary prop/costume hook visible in major frames
  texture_materials:
    base_costume: stern jurist face, slick hair, dark formal coat fused with angular armor plates, red legal sash, heavy boots, law tablet, hard
      border-wall VFX
    cloth: '2-3 tone clusters: hard shadow, midtone, one highlight; folds should support the pose and not become noise'
    skin_hair: small readable clusters; face identity should survive at gameplay scale
    metal_or_prop: use one bright edge highlight and one dark underside; prop should not change size between frames
    vfx: 'compact effects derived from mechanic: borders, beam authority, exception state; VFX must stay behind or around the silhouette unless
      it is the impact frame'
  palette_budget:
    primary: '#111217'
    secondary: '#50545C'
    accent: '#C8B98C'
    vfx_1: '#B51624'
    vfx_2: '#E8E8E8'
    shadow: '#D6A536'
    rule: do not introduce more than two new bright VFX colors beyond these anchors
  edge_and_shadow_rules:
  - Use a stable one-pixel dark outline around the readable silhouette.
  - Keep feet aligned to a common baseline except jump/KO frames.
  - No cast shadow that merges cells; if needed, use tiny semi-transparent contact shadow inside each cell.
  - Motion trails must fit fully inside the active frame cell and never connect neighboring cells.
  placeholder_policy:
    accepted_for_runtime: true
    placeholder_use: placeholder sheets are allowed for gameplay/runtime validation only
    replacement_ready: final generated sheets should preserve this texture bible and use the same manifest output names
storyboards:
  grid01_movement_storyboard:
    intent: establish Carl Schmitt as armored rule-breaker through readable locomotion and damage states
    beats:
      1-2: 'idle A/B: two breathing/weight-shift variants, no costume change'
      3-4: 'hurt light/heavy: impact recoil while preserving face/prop identity'
      5-8: 'walk cycle: contact, passing, plant, recovery; loopable'
      9-12: 'run cycle: load, longest stride, pass, push-off; loopable and role-specific'
      13-15: jump takeoff, jump apex, running jump; clear feet and landing direction
      '16': 'KO/downed: full body visible, unmistakably same character'
    continuity_notes:
    - same scale in every cell
    - same ground baseline for grounded frames
    - no duplicate idle/run poses
  grid02_fighting_storyboard:
    intent: show the core combat vocabulary before specials
    beats:
      1-3: 'Decision Jab: startup, impact, recovery'
      4-6: 'running Jurist Crush: run transition, impact, slide/recover'
      7-9: 'aerial/running Border Kick: approach, hit, landing recovery'
      10-12: 'running evasion/block: enter guard, guarded frame, punish-ready exit'
      13-14: basic block and fortified block, with one compact defensive accent
      15-16: victory pose A/B, character-specific and readable at small size
    continuity_notes:
    - attacks must not look like specials
    - impact frame is the clearest silhouette
    - recovery always returns toward idle stance
  grid03_interaction_storyboard:
    intent: cover object interactions and four MVP combo keyposes
    beats:
      1-4: 'throw: pickup/ready, windup, release, recovery'
      5-8: 'consume/use: raise item, active use, glint/effect, return'
      9-12: 'swing: startup, impact, follow-through, reset'
      '13': B>A Sovereign Beam keypose
      '14': B<A Exception Counter keypose
      '15': BvA Border Wall Field keypose
      '16': BvJ State of Exception keypose
    continuity_notes:
    - combo keyposes are caster silhouettes, not full projectile renders
    - item size remains consistent
    - compact VFX only
  grid04_specials_storyboard:
    intent: one row per MVP special; emphasize borders, beam authority, exception state
    rows:
      row1_frames_1_4: 'B>A Sovereign Beam: startup, release, impact/sustain, recovery'
      row2_frames_5_8: 'B<A Exception Counter: startup, release, impact/sustain, recovery'
      row3_frames_9_12: 'BvA Border Wall Field: startup, release, impact/sustain, recovery'
      row4_frames_13_16: 'BvJ State of Exception: startup, release, impact/sustain, recovery'
    continuity_notes:
    - each row is independent
    - do not blend VFX between rows
    - final frame of each row should be reusable as recovery/landing candidate
