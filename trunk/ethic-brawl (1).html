<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC BRAWL - Philosophical Combat Arena</title>
    <style>
        /* ==================== EMBEDDED CSS ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0c29;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1280px;
            max-height: 720px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* CRT Scanline Effect Overlay */
        #crtOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 10;
        }

        /* Mobile Controls */
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 10px;
            z-index: 20;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 242, 96, 0.3);
            border: 2px solid #00f260;
            color: #00f260;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: rgba(0, 242, 96, 0.6);
        }

        #dpad {
            position: absolute;
            left: 20px;
            bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }

        #actionButtons {
            position: absolute;
            right: 20px;
            bottom: 20px;
            display: grid;
            grid-template-columns: repeat(2, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="crtOverlay"></div>
        
        <!-- Mobile Touch Controls -->
        <div id="mobileControls">
            <div id="dpad">
                <div></div>
                <button class="mobile-btn" data-key="w">UP</button>
                <div></div>
                <button class="mobile-btn" data-key="a">LEFT</button>
                <button class="mobile-btn" data-key="s">DOWN</button>
                <button class="mobile-btn" data-key="d">RIGHT</button>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div id="actionButtons">
                <button class="mobile-btn" data-key="j">ATK</button>
                <button class="mobile-btn" data-key="l">JMP</button>
                <button class="mobile-btn" data-key="k">BLK</button>
                <button class="mobile-btn" data-key="i">SPC</button>
            </div>
        </div>
    </div>

    <script>
    // ==================== ETHIC BRAWL - Complete Game Implementation ====================
    // A philosophical cyberpunk brawler featuring history's greatest thinkers
    // Single HTML file with embedded CSS and JavaScript
    // ==================================================================================

    (function() {
        'use strict';

        // ==================== SECTION 1: CONFIGURATION & CONSTANTS ====================
        
        const CONFIG = {
            // Display settings
            CANVAS_WIDTH: 1280,
            CANVAS_HEIGHT: 720,
            TARGET_FPS: 60,
            
            // Game colors (cyberpunk palette)
            COLORS: {
                BG_PRIMARY: '#0f0c29',
                BG_SECONDARY: '#302b63',
                BG_TERTIARY: '#24243e',
                NEON_GREEN: '#00f260',
                NEON_BLUE: '#0575E6',
                NEON_PINK: '#ff00ff',
                NEON_CYAN: '#00ffff',
                NEON_ORANGE: '#ff6b35',
                NEON_YELLOW: '#f7ff00',
                WHITE: '#ffffff',
                BLACK: '#000000',
                HEALTH_RED: '#ff3333',
                HEALTH_GREEN: '#00ff66',
                SPECIAL_PURPLE: '#9933ff',
                COMBO_GOLD: '#ffd700'
            },
            
            // Combat constants
            GRAVITY: 0.8,
            GROUND_Y: 550,
            LANE_TOP: 480,
            LANE_BOTTOM: 580,
            
            // Timing
            HIT_STUN_FRAMES: 15,
            BLOCK_STUN_FRAMES: 8,
            INVULN_FRAMES: 30,
            COMBO_WINDOW_FRAMES: 90,
            
            // Audio
            BPM: 120,
            AUDIO_ENABLED: true
        };

        // ==================== SECTION 2: GAME STATE MANAGEMENT ====================
        
        const GameState = {
            MENU: 'menu',
            CHARACTER_SELECT: 'characterSelect',
            FIGHTING: 'fighting',
            ROUND_START: 'roundStart',
            DISCIPLE_CHALLENGE: 'discipleChallenge',
            UPGRADE: 'upgrade',
            RESULTS: 'results',
            PAUSED: 'paused'
        };

        // Main game state container
        const Game = {
            state: GameState.MENU,
            previousState: null,
            frameCount: 0,
            deltaTime: 0,
            lastTime: 0,
            screenShake: { x: 0, y: 0, intensity: 0 },
            slowMotion: 1,
            
            // Game session data
            session: {
                score: 0,
                combo: 0,
                maxCombo: 0,
                comboTimer: 0,
                round: 1,
                xp: 0,
                totalXP: 0,
                wins: 0,
                losses: 0,
                hitsLanded: 0,
                hitsBlocked: 0,
                perfectBlocks: 0,
                specialsLanded: 0
            },
            
            // Player stats/upgrades
            playerStats: {
                defense: 1,
                agility: 1,
                strength: 1,
                magic: 1
            },
            
            // Custom special configuration
            customSpecial: {
                trigger: 'block-forward',
                form: 'burst',
                element: 'logic',
                modifier: 'stun'
            },
            
            // Track if enemy was just defeated
            enemyDefeated: false,
            
            // Secret codes
            codes: {
                'FREE THINKER': { effect: 'unlockAll' },
                'ABSURDIST': { effect: 'maxStats' },
                'DIONYSUS': { effect: 'slowMotion' },
                'CAVE SHADOW': { effect: 'invisibleEnemies' }
            },
            activeCodes: new Set(),
            
            // Screen flash effects
            flash: { active: false, color: '#ffffff', alpha: 0, duration: 0 }
        };

        // ==================== SECTION 3: CANVAS & RENDERING SETUP ====================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function initCanvas() {
            canvas.width = CONFIG.CANVAS_WIDTH;
            canvas.height = CONFIG.CANVAS_HEIGHT;
            
            // Enable image smoothing for cleaner look
            ctx.imageSmoothingEnabled = false;
        }
        
        // Utility rendering functions
        function drawGlow(x, y, radius, color, alpha = 0.5) {
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'transparent');
            ctx.globalAlpha = alpha;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
        
        function drawNeonText(text, x, y, size, color, glowColor) {
            ctx.font = `bold ${size}px Courier New`;
            ctx.textAlign = 'center';
            
            // Glow effect
            ctx.shadowColor = glowColor || color;
            ctx.shadowBlur = 20;
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
            
            // Clear text on top
            ctx.shadowBlur = 10;
            ctx.fillText(text, x, y);
            ctx.shadowBlur = 0;
        }

        // ==================== SECTION 4: INPUT MANAGER ====================
        
        const Input = {
            keys: {},
            justPressed: {},
            justReleased: {},
            previousKeys: {},
            
            // Key bindings for Player 1
            bindings: {
                left: ['a', 'A', 'ArrowLeft'],
                right: ['d', 'D', 'ArrowRight'],
                up: ['w', 'W', 'ArrowUp'],
                down: ['s', 'S', 'ArrowDown'],
                attack: ['j', 'J'],
                block: ['k', 'K'],
                jump: ['l', 'L'],
                special: ['i', 'I'],
                start: [' ', 'Enter'],
                back: ['Escape']
            },
            
            init() {
                window.addEventListener('keydown', (e) => {
                    const key = e.key;
                    if (!this.keys[key]) {
                        this.justPressed[key] = true;
                    }
                    this.keys[key] = true;
                    
                    // Prevent default for game keys
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                        e.preventDefault();
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                    this.justReleased[e.key] = true;
                });
                
                // Mobile touch controls
                this.initMobileControls();
            },
            
            initMobileControls() {
                const mobileButtons = document.querySelectorAll('.mobile-btn');
                mobileButtons.forEach(btn => {
                    const key = btn.dataset.key;
                    
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.keys[key] = true;
                        this.justPressed[key] = true;
                    });
                    
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.keys[key] = false;
                        this.justReleased[key] = true;
                    });
                });
            },
            
            isDown(action) {
                const bindings = this.bindings[action];
                return bindings ? bindings.some(k => this.keys[k]) : false;
            },
            
            isJustPressed(action) {
                const bindings = this.bindings[action];
                return bindings ? bindings.some(k => this.justPressed[k]) : false;
            },
            
            isJustReleased(action) {
                const bindings = this.bindings[action];
                return bindings ? bindings.some(k => this.justReleased[k]) : false;
            },
            
            clearFrame() {
                this.justPressed = {};
                this.justReleased = {};
            },
            
            // Double tap detection for running
            lastTapTime: { left: 0, right: 0 },
            isDoubleTap(direction) {
                const now = performance.now();
                const diff = now - this.lastTapTime[direction];
                this.lastTapTime[direction] = now;
                return diff < 250;
            }
        };

        // ==================== SECTION 5: AUDIO ENGINE ====================
        
        const Audio = {
            context: null,
            masterGain: null,
            enabled: true,
            
            // Rhythm system
            bpm: CONFIG.BPM,
            beatDuration: 60000 / CONFIG.BPM,
            currentBeat: 0,
            nextBeatTime: 0,
            beatSubdivision: 4, // 16th notes
            
            // Music synthesis state
            arpeggioPhase: 0,
            bassPhase: 0,
            drumPhase: 0,
            
            init() {
                try {
                    this.context = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.context.createGain();
                    this.masterGain.gain.value = 0.3;
                    this.masterGain.connect(this.context.destination);
                    this.enabled = true;
                } catch (e) {
                    console.warn('Web Audio API not supported');
                    this.enabled = false;
                }
            },
            
            resume() {
                if (this.context && this.context.state === 'suspended') {
                    this.context.resume();
                }
            },
            
            // Procedural sound synthesis
            playTone(frequency, duration, type = 'square', volume = 0.3) {
                if (!this.enabled || !this.context) return;
                
                const osc = this.context.createOscillator();
                const gain = this.context.createGain();
                
                osc.type = type;
                osc.frequency.value = frequency;
                
                gain.gain.setValueAtTime(volume, this.context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.context.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start(this.context.currentTime);
                osc.stop(this.context.currentTime + duration);
            },
            
            playHit(intensity = 1) {
                this.playTone(150 + intensity * 50, 0.1, 'sawtooth', 0.2);
                this.playTone(80, 0.05, 'square', 0.3);
            },
            
            playBlock() {
                this.playTone(200, 0.05, 'triangle', 0.2);
                this.playTone(400, 0.03, 'sine', 0.1);
            },
            
            playPerfectBlock() {
                this.playTone(600, 0.15, 'sine', 0.3);
                this.playTone(800, 0.1, 'sine', 0.2);
                this.playTone(1000, 0.05, 'sine', 0.1);
            },
            
            playCombo(count) {
                const baseFreq = 300 + count * 20;
                this.playTone(baseFreq, 0.1, 'square', 0.15);
                this.playTone(baseFreq * 1.5, 0.08, 'sine', 0.1);
            },
            
            playSpecial() {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        this.playTone(200 + i * 100, 0.2, 'sawtooth', 0.15);
                    }, i * 30);
                }
            },
            
            playVictory() {
                const notes = [523, 659, 784, 1047]; // C E G C
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        this.playTone(freq, 0.3, 'sine', 0.25);
                        this.playTone(freq * 0.5, 0.3, 'triangle', 0.15);
                    }, i * 150);
                });
            },
            
            playDefeat() {
                const notes = [400, 350, 300, 200];
                notes.forEach((freq, i) => {
                    setTimeout(() => {
                        this.playTone(freq, 0.4, 'sawtooth', 0.2);
                    }, i * 200);
                });
            },
            
            playPickup() {
                this.playTone(800, 0.05, 'sine', 0.2);
                this.playTone(1000, 0.05, 'sine', 0.15);
                setTimeout(() => this.playTone(1200, 0.1, 'sine', 0.1), 50);
            },
            
            // Rhythm-synced sound scheduling
            scheduleOnBeat(callback, subdivision = 1) {
                if (!this.enabled) {
                    callback();
                    return;
                }
                
                const beatTime = this.beatDuration / subdivision;
                const currentTime = this.context.currentTime * 1000;
                const timeSinceLastBeat = currentTime % beatTime;
                const timeToNextBeat = beatTime - timeSinceLastBeat;
                
                setTimeout(callback, timeToNextBeat);
            },
            
            // Background music synthesis
            updateMusic(deltaTime) {
                if (!this.enabled || Game.state !== GameState.FIGHTING) return;
                
                const beatTime = this.beatDuration;
                const currentTime = this.context.currentTime * 1000;
                
                // Check if we crossed a beat boundary
                if (currentTime >= this.nextBeatTime) {
                    this.currentBeat++;
                    this.nextBeatTime = currentTime + beatTime;
                    
                    // Trigger beat-synchronized sounds
                    this.playBeatElement();
                }
            },
            
            playBeatElement() {
                const beat = this.currentBeat % 16;
                
                // Kick drum on 1 and 3
                if (beat % 4 === 0) {
                    this.playTone(60, 0.1, 'sine', 0.25);
                }
                
                // Hi-hat on offbeats
                if (beat % 2 === 1) {
                    this.playTone(8000, 0.02, 'square', 0.03);
                }
                
                // Bass pattern
                if (beat % 4 === 0) {
                    const bassNotes = [55, 55, 73, 73];
                    const noteIndex = Math.floor(beat / 4) % bassNotes.length;
                    this.playTone(bassNotes[noteIndex], 0.2, 'sawtooth', 0.08);
                }
                
                // Arpeggio synth
                const arpNotes = [262, 330, 392, 523];
                const arpNote = arpNotes[beat % arpNotes.length];
                if (beat % 2 === 0) {
                    this.playTone(arpNote, 0.08, 'triangle', 0.04);
                }
            }
        };

        // ==================== SECTION 6: PARTICLE SYSTEM ====================
        
        const Particles = {
            particles: [],
            
            create(x, y, type, options = {}) {
                const particle = {
                    x, y,
                    vx: options.vx || (Math.random() - 0.5) * 5,
                    vy: options.vy || (Math.random() - 0.5) * 5,
                    size: options.size || 3,
                    color: options.color || CONFIG.COLORS.NEON_GREEN,
                    life: options.life || 30,
                    maxLife: options.life || 30,
                    type,
                    gravity: options.gravity !== undefined ? options.gravity : 0.1
                };
                
                this.particles.push(particle);
            },
            
            createHitSpark(x, y, color = CONFIG.COLORS.NEON_YELLOW) {
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 / 8) * i;
                    this.create(x, y, 'spark', {
                        vx: Math.cos(angle) * 8,
                        vy: Math.sin(angle) * 8,
                        color,
                        life: 15,
                        size: 4,
                        gravity: 0
                    });
                }
            },
            
            createExplosion(x, y, color = CONFIG.COLORS.NEON_ORANGE) {
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 6;
                    this.create(x, y, 'explosion', {
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        color,
                        life: 30 + Math.random() * 20,
                        size: 3 + Math.random() * 4,
                        gravity: 0.05
                    });
                }
            },
            
            createDust(x, y) {
                for (let i = 0; i < 5; i++) {
                    this.create(x, y, 'dust', {
                        vx: (Math.random() - 0.5) * 3,
                        vy: -Math.random() * 2,
                        color: CONFIG.COLORS.BG_TERTIARY,
                        life: 20,
                        size: 2 + Math.random() * 3,
                        gravity: 0.02
                    });
                }
            },
            
            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.life--;
                    
                    // Apply friction
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            },
            
            draw(ctx) {
                this.particles.forEach(p => {
                    const alpha = p.life / p.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    
                    if (p.type === 'spark') {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                    }
                });
                ctx.globalAlpha = 1;
            },
            
            clear() {
                this.particles = [];
            }
        };

        // ==================== SECTION 7: FIGHTER DEFINITIONS ====================
        
        const FighterData = {
            // Character definitions with unique stats and abilities
            camus: {
                name: 'ALBERT CAMUS',
                title: 'The Absurdist',
                description: 'Embrace the absurd. Fight without hope.',
                color: CONFIG.COLORS.NEON_ORANGE,
                accentColor: '#ff8c00',
                stats: {
                    health: 100,
                    speed: 5,
                    attack: 12,
                    defense: 0.85,
                    jumpPower: 14,
                    specialPower: 25
                },
                special: {
                    name: 'Existential Burst',
                    description: 'A shockwave of pure absurdity',
                    type: 'burst',
                    damage: 25,
                    range: 150
                },
                // Procedural drawing parameters
                body: { width: 40, height: 60, headSize: 22 },
                draw: function(ctx, fighter) {
                    const x = fighter.x;
                    const y = fighter.y;
                    const facing = fighter.facing;
                    
                    // Body glow
                    drawGlow(x, y - 40, 50, this.color, 0.3);
                    
                    // Coat effect
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(x - 20, y - 30);
                    ctx.lineTo(x + 20, y - 30);
                    ctx.lineTo(x + 25 * facing, y + 10);
                    ctx.lineTo(x - 25 * facing, y + 10);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Body
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(x - 15, y - 55, 30, 50);
                    
                    // Head
                    ctx.fillStyle = '#ddd';
                    ctx.beginPath();
                    ctx.arc(x, y - 70, 15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Cigarette (signature)
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x + 10 * facing, y - 70);
                    ctx.lineTo(x + 20 * facing, y - 72);
                    ctx.stroke();
                    
                    // Glowing ember
                    ctx.fillStyle = '#ff3333';
                    ctx.beginPath();
                    ctx.arc(x + 20 * facing, y - 72, 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Eyes
                    ctx.fillStyle = this.color;
                    ctx.fillRect(x + 5 * facing, y - 73, 4, 2);
                    ctx.fillRect(x - 5 * facing, y - 73, 4, 2);
                }
            },
            
            machiavelli: {
                name: 'MACHIAVELLI',
                title: 'The Strategist',
                description: 'The ends justify the means.',
                color: CONFIG.COLORS.NEON_PURPLE,
                accentColor: '#cc00ff',
                stats: {
                    health: 85,
                    speed: 7,
                    attack: 14,
                    defense: 0.75,
                    jumpPower: 15,
                    specialPower: 30
                },
                special: {
                    name: 'Political Feint',
                    description: 'Deceptive counter-attack',
                    type: 'counter',
                    damage: 30,
                    range: 100
                },
                draw: function(ctx, fighter) {
                    const x = fighter.x;
                    const y = fighter.y;
                    const facing = fighter.facing;
                    
                    // Sinister glow
                    drawGlow(x, y - 40, 45, this.color, 0.3);
                    
                    // Renaissance cloak
                    ctx.fillStyle = '#2d0a3e';
                    ctx.beginPath();
                    ctx.moveTo(x - 15, y - 50);
                    ctx.quadraticCurveTo(x, y - 70, x + 15, y - 50);
                    ctx.lineTo(x + 20, y + 10);
                    ctx.lineTo(x - 20, y + 10);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Trim
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Body
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(x - 12, y - 55, 24, 45);
                    
                    // Head
                    ctx.fillStyle = '#ddd';
                    ctx.beginPath();
                    ctx.arc(x, y - 68, 14, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Hood shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath();
                    ctx.arc(x, y - 68, 14, Math.PI, Math.PI * 2);
                    ctx.fill();
                    
                    // Calculating eyes
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.arc(x + 5 * facing, y - 70, 2, 0, Math.PI * 2);
                    ctx.arc(x - 3 * facing, y - 70, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // Hidden dagger
                    if (fighter.state === 'blocking' || fighter.isSpecialActive) {
                        ctx.fillStyle = '#silver';
                        ctx.fillRect(x + 20 * facing, y - 40, 15 * facing, 3);
                    }
                }
            },
            
            diogenes: {
                name: 'DIOGENES',
                title: 'The Cynic',
                description: 'I am looking for an honest man.',
                color: CONFIG.COLORS.NEON_YELLOW,
                accentColor: '#ffd700',
                stats: {
                    health: 90,
                    speed: 6,
                    attack: 10,
                    defense: 0.90,
                    jumpPower: 13,
                    specialPower: 20
                },
                special: {
                    name: 'Lamp Blast',
                    description: 'Blinding light of truth',

        // ==================== SECTION 8: FIGHTER ENTITY CLASS ====================
        
        class Fighter {
            constructor(fighterType, isPlayer = true, playerNum = 1) {
                const data = FighterData[fighterType];
                
                this.type = fighterType;
                this.data = data;
                this.isPlayer = isPlayer;
                this.playerNum = playerNum;
                
                // Position and movement
                this.x = isPlayer ? 200 : CONFIG.CANVAS_WIDTH - 200;
                this.y = CONFIG.GROUND_Y;
                this.vx = 0;
                this.vy = 0;
                this.facing = isPlayer ? 1 : -1;
                this.laneY = 0; // Offset for lane movement
                
                // Stats (affected by upgrades)
                this.maxHealth = data.stats.health;
                this.health = this.maxHealth;
                this.speed = data.stats.speed;
                this.attack = data.stats.attack;
                this.defense = data.stats.defense;
                this.jumpPower = data.stats.jumpPower;
                this.specialPower = data.stats.specialPower;
                
                // Combat state
                this.state = 'idle';
                this.stateTimer = 0;
                this.isGrounded = true;
                this.isBlocking = false;
                this.isRunning = false;
                this.canDoubleJump = true;
                
                // Hit/hurt state
                this.hitStun = 0;
                this.blockStun = 0;
                this.invulnFrames = 0;
                this.invincible = false;
                
                // Special meter
                this.specialMeter = 0;
                this.maxSpecialMeter = 100;
                this.isSpecialActive = false;
                this.specialTimer = 0;
                
                // Animation
                this.animFrame = 0;
                this.animTimer = 0;
                this.attackFrame = 0;
                this.attackType = null;
                
                // Combat tracking
                this.comboCount = 0;
                this.lastHitTime = 0;
                
                // Hitboxes
                this.hitbox = { x: 0, y: 0, width: 40, height: 70 };
                this.attackHitbox = null;
                
                // AI state
                this.ai = isPlayer ? null : new AIController(this);
            }
            
            update(deltaTime) {
                // Update timers
                if (this.hitStun > 0) this.hitStun--;
                if (this.blockStun > 0) this.blockStun--;
                if (this.invulnFrames > 0) this.invulnFrames--;
                if (this.stateTimer > 0) this.stateTimer--;
                if (this.specialTimer > 0) this.specialTimer--;
                
                // Apply hit stun
                if (this.hitStun > 0) {
                    this.state = 'hitStun';
                } else if (this.blockStun > 0) {
                    this.state = 'blocking';
                }
                
                // Apply gravity
                if (!this.isGrounded) {
                    this.vy += CONFIG.GRAVITY;
                }
                
                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;
                
                // Lane movement (y position offset)
                this.y = Math.max(CONFIG.LANE_TOP, Math.min(CONFIG.LANE_BOTTOM, this.y));
                
                // Ground check
                if (this.y >= CONFIG.GROUND_Y) {
                    this.y = CONFIG.GROUND_Y;
                    this.vy = 0;
                    this.isGrounded = true;
                    this.canDoubleJump = true;
                } else {
                    this.isGrounded = false;
                }
                
                // Boundary check
                this.x = Math.max(50, Math.min(CONFIG.CANVAS_WIDTH - 50, this.x));
                
                // Friction
                this.vx *= 0.85;
                
                // Face opponent
                if (this.hitStun === 0 && this.state !== 'attacking') {
                    const opponent = this.isPlayer ? enemy : player;
                    if (opponent) {
                        this.facing = opponent.x > this.x ? 1 : -1;
                    }
                }
                
                // Update hitbox
                this.hitbox.x = this.x - 20;
                this.hitbox.y = this.y - 70;
                
                // Animation timer
                this.animTimer++;
                if (this.animTimer >= 8) {
                    this.animTimer = 0;
                    this.animFrame = (this.animFrame + 1) % 4;
                }
                
                // AI update
                if (this.ai) {
                    this.ai.update(deltaTime);
                }
                
                // Special meter decay
                if (this.specialMeter > 0 && this.state === 'idle') {
                    // Slow natural decay
                }
            }
            
            handleInput() {
                if (!this.isPlayer || this.hitStun > 0 || this.blockStun > 0) return;
                
                // Movement
                if (Input.isDown('left')) {
                    this.vx -= this.speed * 0.3;
                    if (this.isGrounded && this.state !== 'attacking') {
                        this.state = 'walking';
                    }
                }
                if (Input.isDown('right')) {
                    this.vx += this.speed * 0.3;
                    if (this.isGrounded && this.state !== 'attacking') {
                        this.state = 'walking';
                    }
                }
                
                // Lane movement
                if (Input.isDown('up')) {
                    this.y -= this.speed * 0.2;
                }
                if (Input.isDown('down')) {
                    this.y += this.speed * 0.2;
                }
                
                // Jump
                if (Input.isJustPressed('jump')) {
                    if (this.isGrounded) {
                        this.vy = -this.jumpPower;
                        this.isGrounded = false;
                        Audio.playTone(300, 0.1, 'sine', 0.1);
                    } else if (this.canDoubleJump) {
                        this.vy = -this.jumpPower * 0.8;
                        this.canDoubleJump = false;
                        Audio.playTone(350, 0.1, 'sine', 0.1);
                    }
                }
                
                // Block
                this.isBlocking = Input.isDown('block');
                if (this.isBlocking && this.isGrounded && this.state !== 'attacking') {
                    this.state = 'blocking';
                }
                
                // Attack
                if (Input.isJustPressed('attack') && this.state !== 'attacking') {
                    this.attack();
                }
                
                // Special
                if (Input.isJustPressed('special') && this.specialMeter >= 50 && !this.isSpecialActive) {
                    this.useSpecial();
                }
                
                // Running (double tap)
                // Simplified running detection
                if (this.state === 'walking' && Math.abs(this.vx) > this.speed * 0.8) {
                    this.isRunning = true;
                } else {
                    this.isRunning = false;
                }
                
                // Idle state
                if (!Input.isDown('left') && !Input.isDown('right') && 
                    !this.isBlocking && this.state !== 'attacking' && 
                    this.hitStun === 0) {
                    this.state = 'idle';
                }
            }
            
            attack() {
                this.state = 'attacking';
                this.stateTimer = 20;
                this.attackFrame = 0;
                
                // Determine attack type based on state
                if (!this.isGrounded) {
                    this.attackType = 'aerial';
                    this.attackHitbox = {
                        x: this.x + this.facing * 20,
                        y: this.y - 40,
                        width: 40,
                        height: 30
                    };
                } else if (this.isRunning) {
                    this.attackType = 'running';
                    this.attackHitbox = {
                        x: this.x + this.facing * 30,
                        y: this.y - 50,
                        width: 50,
                        height: 40
                    };
                } else {
                    this.attackType = 'basic';
                    this.attackHitbox = {
                        x: this.x + this.facing * 15,
                        y: this.y - 60,
                        width: 35,
                        height: 40
                    };
                }
                
                Audio.playHit(0.5);
            }
            
            useSpecial() {
                this.isSpecialActive = true;
                this.specialTimer = 60;
                this.specialMeter -= 50;
                this.state = 'special';
                this.stateTimer = 40;
                
                Audio.playSpecial();
                
                // Create special effect particles
                Particles.createExplosion(this.x, this.y - 40, this.data.color);
                
                // Screen flash
                triggerScreenFlash(this.data.color, 10, 0.5);
            }
            
            takeDamage(amount, knockbackX = 0, knockbackY = 0) {
                if (this.invulnFrames > 0) return;
                
                // Apply defense stat
                const actualDamage = Math.floor(amount * (1 - this.defense * Game.playerStats.defense * 0.2));
                
                this.health -= actualDamage;
                this.hitStun = CONFIG.HIT_STUN_FRAMES;
                this.vx = knockbackX;
                this.vy = knockbackY;
                
                // Screen shake
                triggerScreenShake(5);
                
                // Hit particles
                Particles.createHitSpark(this.x, this.y - 40, this.data.color);
                
                // Audio
                Audio.playHit(1);
                
                // Health cap
                if (this.health < 0) this.health = 0;
                
                // Update combo
                Game.session.hitsLanded++;
            }
            
            blockAttack(damage, perfect = false) {
                if (perfect) {
                    // Perfect block - no damage, counter window
                    this.blockStun = CONFIG.BLOCK_STUN_FRAMES * 0.5;
                    Game.session.perfectBlocks++;
                    Audio.playPerfectBlock();
                    
                    // Visual feedback
                    triggerScreenFlash(CONFIG.COLORS.NEON_CYAN, 5, 0.3);
                    Particles.createHitSpark(this.x, this.y - 40, CONFIG.COLORS.NEON_CYAN);
                } else {
                    // Normal block - reduced damage
                    const blockedDamage = damage * 0.2;
                    this.health -= blockedDamage;
                    this.blockStun = CONFIG.BLOCK_STUN_FRAMES;
                    Audio.playBlock();
                    
                    Game.session.hitsBlocked++;
                }
                
                triggerScreenShake(3);
            }
            
            draw(ctx) {
                ctx.save();
                
                // Flicker during invulnerability
                if (this.invulnFrames > 0 && Math.floor(this.invulnFrames / 3) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // Draw shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x, CONFIG.GROUND_Y + 5, 25, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Animation offset
                let drawY = this.y;
                if (this.state === 'walking') {
                    drawY += Math.sin(this.animFrame * 0.5) * 2;
                }
                if (this.state === 'hitStun') {
                    drawY += Math.sin(Game.frameCount * 0.8) * 3;
                }
                
                // Store modified position for drawing
                const originalY = this.y;
                this.y = drawY;
                
                // Draw character using data's draw function
                this.data.draw(ctx, this);
                
                this.y = originalY;
                
                // Draw attack hitbox (debug - comment out for release)
                // if (this.attackHitbox && this.state === 'attacking') {
                //     ctx.strokeStyle = 'red';
                //     ctx.strokeRect(
                //         this.attackHitbox.x - this.attackHitbox.width/2,
                //         this.attackHitbox.y - this.attackHitbox.height/2,
                //         this.attackHitbox.width,
                //         this.attackHitbox.height
                //     );
                // }
                
                // Special effect overlay
                if (this.isSpecialActive) {
                    ctx.globalCompositeOperation = 'screen';
                    drawGlow(this.x, this.y - 40, 100, this.data.color, 0.5 + Math.sin(Game.frameCount * 0.2) * 0.3);
                    ctx.globalCompositeOperation = 'source-over';
                }
                
                ctx.restore();
            }
            
            // Check if attack hit opponent
            checkAttackHit(opponent) {
                if (!this.attackHitbox || this.state !== 'attacking') return false;
                if (this.attackFrame > 10) return false; // Attack already connected
                
                const hb = this.attackHitbox;
                const oppHb = opponent.hitbox;
                
                // Simple AABB collision
                const hit = (
                    hb.x < oppHb.x + oppHb.width &&
                    hb.x + hb.width > oppHb.x &&
                    hb.y < oppHb.y + oppHb.height &&
                    hb.y + hb.height > oppHb.y
                );
                
                if (hit && this.attackFrame < 5) {
                    this.attackFrame = 15; // Mark as hit
                    
                    // Check if opponent is blocking
                    if (opponent.isBlocking && opponent.facing !== this.facing) {
                        // Perfect block window
                        const perfectWindow = 5;
                        const justBlocked = opponent.blockStun < perfectWindow;
                        opponent.blockAttack(this.attack, justBlocked);
                    } else {
                        // Calculate knockback
                        const kbX = this.facing * 5;
                        const kbY = -3;
                        
                        opponent.takeDamage(this.attack, kbX, kbY);
                        
                        // Gain special meter
                        this.specialMeter = Math.min(this.maxSpecialMeter, this.specialMeter + 10);
                        
                        // Combo
                        Game.session.combo++;
                        Game.session.comboTimer = CONFIG.COMBO_WINDOW_FRAMES;
                        Game.session.score += 100 * Game.session.combo;
                        
                        Audio.playCombo(Game.session.combo);
                    }
                    
                    return true;
                }
                
                this.attackFrame++;
                return false;
            }
        }

        // ==================== SECTION 9: AI CONTROLLER ====================
        
        class AIController {
            constructor(fighter) {
                this.fighter = fighter;
                this.difficulty = 0.7; // 0-1 scale
                this.actionTimer = 0;
                this.currentAction = 'idle';
                this.targetX = fighter.x;
                this.targetY = fighter.y;
                this.reactionDelay = Math.floor(10 + Math.random() * 20);
                this.aggression = 0.6;
            }
            
            update(deltaTime) {
                if (this.fighter.hitStun > 0 || this.fighter.state === 'attacking') return;
                
                const opponent = this.fighter.isPlayer ? enemy : player;
                if (!opponent) return;
                
                const dx = opponent.x - this.fighter.x;
                const dy = opponent.y - this.fighter.y;
                const distance = Math.abs(dx);
                
                this.actionTimer--;
                
                // Decision making
                if (this.actionTimer <= 0) {
                    this.actionTimer = Math.floor(20 + Math.random() * 30);
                    
                    // Distance-based behavior
                    if (distance < 80) {
                        // Close range - attack or block
                        if (opponent.state === 'attacking' && Math.random() < this.difficulty * 0.8) {
                            this.currentAction = 'block';
                        } else if (Math.random() < this.aggression) {
                            this.currentAction = 'attack';
                        } else {
                            this.currentAction = 'retreat';
                        }
                    } else if (distance < 200) {
                        // Medium range - approach or use special
                        if (Math.random() < this.aggression * 0.7) {
                            this.currentAction = 'approach';
                        } else if (this.fighter.specialMeter >= 50 && Math.random() < 0.3) {
                            this.currentAction = 'special';
                        } else {
                            this.currentAction = 'circle';
                        }
                    } else {
                        // Far range - approach
                        this.currentAction = 'approach';
                    }
                    
                    // Random lane movement
                    if (Math.random() < 0.2) {
                        this.targetY = opponent.y + (Math.random() - 0.5) * 100;
                    }
                }
                
                // Execute actions
                this.executeAction(opponent, dx, dy, distance);
            }
            
            executeAction(opponent, dx, dy, distance) {
                const f = this.fighter;
                
                switch (this.currentAction) {
                    case 'approach':
                        f.vx += Math.sign(dx) * f.speed * 0.2;
                        f.state = 'walking';
                        
                        // Jump occasionally
                        if (Math.random() < 0.02 && f.isGrounded) {
                            f.vy = -f.jumpPower;
                            f.isGrounded = false;
                        }
                        break;
                        
                    case 'retreat':
                        f.vx -= Math.sign(dx) * f.speed * 0.15;
                        f.state = 'walking';
                        break;
                        
                    case 'circle':
                        // Move perpendicular
                        f.y += (this.targetY - f.y) * 0.05;
                        f.vx += Math.sign(dx) * f.speed * 0.1;
                        break;
                        
                    case 'attack':
                        if (f.state !== 'attacking') {
                            f.attack();
                            this.currentAction = 'idle';
                        }
                        break;
                        
                    case 'block':
                        f.isBlocking = true;
                        f.state = 'blocking';
                        setTimeout(() => {
                            f.isBlocking = false;
                        }, 500);
                        this.currentAction = 'idle';
                        break;
                        
                    case 'special':
                        if (f.specialMeter >= 50 && !f.isSpecialActive) {
                            f.useSpecial();
                        }
                        this.currentAction = 'idle';
                        break;
                }
            }
        }

                    this.spawnTimer = 0;

                // Update items
                this.items.forEach(item => {
                    item.bobOffset += 0.05;
                });
                
                // Check collection
                if (player) {
                    this.items = this.items.filter(item => {
                        const dx = Math.abs(item.x - player.x);
                        const dy = Math.abs(item.y - player.y);
                        
                        if (dx < 30 && dy < 50 && !item.collected) {
                            const itemType = this.types[item.type];

                            Audio.playPickup();
                            Particles.createHitSpark(item.x, item.y, itemType.color);

                        }
                        return true;

                this.countdown--;
                
                // Play countdown sounds
                if (this.countdown === 120) Audio.playTone(440, 0.15, 'square', 0.2); // 3
                if (this.countdown === 80) Audio.playTone(440, 0.15, 'square', 0.2);  // 2
                if (this.countdown === 40) Audio.playTone(440, 0.15, 'square', 0.2);  // 1
                if (this.countdown === 1) Audio.playTone(880, 0.3, 'square', 0.3);    // FIGHT!
                
                if (this.countdown <= 0) {
                    this.active = false;
                    Game.state = GameState.FIGHTING;
                }

            draw(ctx) {
                if (!this.active) return;
                
                const seconds = Math.ceil(this.countdown / 60);
                const text = seconds > 0 ? seconds.toString() : 'FIGHT!';
                const scale = 1 + (60 - (this.countdown % 60)) / 30;
                
                ctx.save();
                ctx.translate(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2);
                ctx.scale(Math.min(scale, 1.5), Math.min(scale, 1.5));
                
                const color = seconds > 0 ? CONFIG.COLORS.NEON_YELLOW : CONFIG.COLORS.NEON_GREEN;
                drawNeonText(text, 0, 0, 72, color, color);
                
                ctx.restore();
                
                // Round indicator
                ctx.font = '24px Courier New';

        // ==================== SECTION 17: HUD DRAWING ====================
        
        const HUD = {

        // ==================== SECTION 18: RESULTS SCREEN ====================
        
        const ResultsScreen = {
            victory: false,
            rank: 'C',
            
            show(victory) {
                this.victory = victory;
                this.calculateRank();
                Game.state = GameState.RESULTS;
            },
            
            calculateRank() {
                const stats = Game.session;
                let score = 0;
                
                // Combo score
                if (stats.maxCombo >= 20) score += 30;
                else if (stats.maxCombo >= 10) score += 20;
                else if (stats.maxCombo >= 5) score += 10;
                
                // Accuracy (hits vs total attempts)
                const accuracy = stats.hitsLanded / (stats.hitsLanded + stats.hitsBlocked + 1);
                score += accuracy * 30;
                
                // Perfect blocks
                score += stats.perfectBlocks * 5;
                
                // Win bonus
                if (this.victory) score += 25;
                
                // Assign rank
                if (score >= 80) this.rank = 'S';
                else if (score >= 65) this.rank = 'A';
                else if (score >= 50) this.rank = 'B';
                else if (score >= 35) this.rank = 'C';
                else this.rank = 'D';
            },
            
            handleInput() {
                if (Input.isJustPressed('attack') || Input.isJustPressed('start')) {
                    resetGame();
                }
                if (Input.isJustPressed('back')) {
                    Game.state = GameState.MENU;
                }
            },
            
            draw(ctx) {
                // Background
                ctx.fillStyle = CONFIG.COLORS.BG_PRIMARY;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                
                // Result text
                const resultText = this.victory ? 'VICTORY!' : 'DEFEAT';
                const resultColor = this.victory ? CONFIG.COLORS.NEON_GREEN : CONFIG.COLORS.HEALTH_RED;
                
                drawNeonText(resultText, CONFIG.CANVAS_WIDTH / 2, 100, 64, resultColor, resultColor);
                
                // Rank
                ctx.font = 'bold 120px Courier New';
                ctx.fillStyle = CONFIG.COLORS.COMBO_GOLD;
                ctx.shadowColor = CONFIG.COLORS.COMBO_GOLD;
                ctx.shadowBlur = 30;
                ctx.textAlign = 'center';
                ctx.fillText(this.rank, CONFIG.CANVAS_WIDTH / 2, 250);
                ctx.shadowBlur = 0;
                
                ctx.font = '24px Courier New';
                ctx.fillStyle = CONFIG.COLORS.WHITE;
                ctx.fillText('RANK', CONFIG.CANVAS_WIDTH / 2, 280);
                
                // Stats
                const stats = Game.session;
                const statY = 340;
                const statsToShow = [
                    ['Score', stats.score],
                    ['Max Combo', stats.maxCombo],
                    ['Hits Landed', stats.hitsLanded],
                    ['Perfect Blocks', stats.perfectBlocks],
                    ['Rounds Won', stats.wins]
                ];
                
                ctx.font = '18px Courier New';
                ctx.textAlign = 'left';
                statsToShow.forEach((stat, i) => {
                    const y = statY + i * 35;
                    ctx.fillStyle = CONFIG.COLORS.NEON_CYAN;
                    ctx.fillText(stat[0], CONFIG.CANVAS_WIDTH / 2 - 150, y);
                    ctx.fillStyle = CONFIG.COLORS.WHITE;
                    ctx.textAlign = 'right';
                    ctx.fillText(stat[1], CONFIG.CANVAS_WIDTH / 2 + 150, y);
                    ctx.textAlign = 'left';
                });
                
                // Radar chart (simplified)
                this.drawRadarChart(ctx, CONFIG.CANVAS_WIDTH / 2, 550, 80);
                
                // Instructions
                ctx.font = '16px Courier New';
                ctx.fillStyle = CONFIG.COLORS.NEON_YELLOW;
                ctx.textAlign = 'center';
                ctx.fillText('ATTACK to retry, ESC for menu', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - 40);
            },
            
            drawRadarChart(ctx, cx, cy, radius) {
                const stats = [
                    Game.session.hitsLanded / 50,
                    Game.session.maxCombo / 20,
                    Game.session.perfectBlocks / 10,
                    (player ? player.health / player.maxHealth : 0),
                    Game.session.specialsLanded / 5
                ];
                const labels = ['Accuracy', 'Combo', 'Blocks', 'Survival', 'Specials'];
                const n = stats.length;
                
                // Draw axes
                ctx.strokeStyle = CONFIG.COLORS.BG_TERTIARY;
                ctx.lineWidth = 1;
                for (let i = 0; i < n; i++) {
                    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
                    const x = cx + Math.cos(angle) * radius;
                    const y = cy + Math.sin(angle) * radius;
                    
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    
                    // Labels
                    ctx.font = '10px Courier New';
                    ctx.fillStyle = CONFIG.COLORS.WHITE;
                    ctx.textAlign = 'center';
                    const labelX = cx + Math.cos(angle) * (radius + 15);
                    const labelY = cy + Math.sin(angle) * (radius + 15);
                    ctx.fillText(labels[i], labelX, labelY);
                }
                
                // Draw data polygon
                ctx.beginPath();
                stats.forEach((stat, i) => {
                    const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
                    const r = Math.min(1, stat) * radius;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.fillStyle = 'rgba(0, 242, 96, 0.3)';
                ctx.fill();
                ctx.strokeStyle = CONFIG.COLORS.NEON_GREEN;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        };

        // ==================== SECTION 19: ARENA RENDERING ====================
        
        const Arena = {
            draw(ctx) {
                // Background gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
                gradient.addColorStop(0, CONFIG.COLORS.BG_PRIMARY);
                gradient.addColorStop(0.5, CONFIG.COLORS.BG_SECONDARY);
                gradient.addColorStop(1, CONFIG.COLORS.BG_TERTIARY);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                
                // Background city silhouette
                this.drawCityBackground(ctx);
                
                // Grid floor
                this.drawFloor(ctx);
                
                // Arena boundaries (subtle)
                ctx.strokeStyle = 'rgba(0, 242, 96, 0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(30, CONFIG.LANE_TOP - 30, CONFIG.CANVAS_WIDTH - 60, CONFIG.LANE_BOTTOM - CONFIG.LANE_TOP + 60);
            },
            
            drawCityBackground(ctx) {
                // Distant buildings
                const buildingColors = [
                    'rgba(15, 12, 41, 0.8)',
                    'rgba(48, 43, 99, 0.6)',
                    'rgba(36, 36, 62, 0.7)'
                ];
                
                for (let i = 0; i < 15; i++) {
                    const x = i * 100 - 50;
                    const height = 100 + Math.sin(i * 0.7) * 80;
                    const width = 60 + Math.cos(i * 1.3) * 20;
                    
                    ctx.fillStyle = buildingColors[i % buildingColors.length];
                    ctx.fillRect(x, CONFIG.LANE_TOP - height, width, height);
                    
                    // Windows
                    ctx.fillStyle = CONFIG.COLORS.NEON_CYAN;
                    for (let wy = CONFIG.LANE_TOP - height + 10; wy < CONFIG.LANE_TOP - 20; wy += 20) {
                        for (let wx = x + 5; wx < x + width - 10; wx += 15) {
                            if (Math.random() > 0.3) {
                                ctx.fillRect(wx, wy, 8, 12);
                            }
                        }
                    }
                }
                
                // Neon signs
                const signTexts = ['TRUTH', 'VIRTUE', 'REASON', 'POWER'];
                signTexts.forEach((text, i) => {
                    const x = 150 + i * 300;
                    const y = CONFIG.LANE_TOP - 200 + Math.sin(i) * 50;
                    
                    ctx.font = 'bold 20px Courier New';
                    ctx.fillStyle = i % 2 === 0 ? CONFIG.COLORS.NEON_PINK : CONFIG.COLORS.NEON_CYAN;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = 10;
                    ctx.fillText(text, x, y);
                    ctx.shadowBlur = 0;
                });
            },
            
            drawFloor(ctx) {
                // Perspective grid
                ctx.strokeStyle = CONFIG.COLORS.NEON_GREEN;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.3;
                
                // Horizontal lines
                for (let y = CONFIG.LANE_TOP; y <= CONFIG.LANE_BOTTOM + 50; y += 30) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(CONFIG.CANVAS_WIDTH, y);
                    ctx.stroke();
                }
                
                // Vertical lines (with perspective)
                for (let x = 0; x <= CONFIG.CANVAS_WIDTH; x += 80) {
                    ctx.beginPath();
                    ctx.moveTo(x, CONFIG.LANE_TOP - 30);
                    ctx.lineTo(x, CONFIG.LANE_BOTTOM + 50);
                    ctx.stroke();
                }
                
                ctx.globalAlpha = 1;
                
                // Ground line glow
                ctx.strokeStyle = CONFIG.COLORS.NEON_GREEN;
                ctx.shadowColor = CONFIG.COLORS.NEON_GREEN;
                ctx.shadowBlur = 10;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, CONFIG.GROUND_Y + 5);
                ctx.lineTo(CONFIG.CANVAS_WIDTH, CONFIG.GROUND_Y + 5);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        };

        // ==================== SECTION 20: GAME LOOP & INITIALIZATION ====================
        
        // Global fighter references
        let player = null;
        let enemy = null;
        
        function startGame(fighterType) {
            Audio.resume();
            
            // Reset session
            Game.session = {
                score: 0,
                combo: 0,
                maxCombo: 0,
                comboTimer: 0,
                round: 1,
                xp: 0,
                totalXP: 0,
                wins: 0,
                losses: 0,
                hitsLanded: 0,
                hitsBlocked: 0,
                perfectBlocks: 0,
                specialsLanded: 0
            };
            
            // Reset flags
            Game.enemyDefeated = false;
            
            // Create fighters
            player = new Fighter(fighterType, true, 1);
            
            // Select random enemy
            const enemyTypes = Object.keys(FighterData).filter(t => t !== fighterType);
            const enemyType = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
            enemy = new Fighter(enemyType, false, 2);
            
            // Initialize systems
            PhilosophyGenerator.init();
            Items.clear();
            Particles.clear();
            
            // Start first round with countdown
            RoundStart.start(1);
        }
        
        function resetGame() {
            player = null;
            enemy = null;
            Game.state = GameState.MENU;
            Menus.selectedOption = 0;
            Menus.characterSelected = 0;
        }
        
        function endMatch(victory) {
            ResultsScreen.show(victory);
            if (victory) {
                Audio.scheduleOnBeat(() => Audio.playVictory(), 1);
            } else {
                Audio.playDefeat();
            }
        }
        
        function spawnNewEnemy() {
            // Select random enemy different from current
            const availableTypes = Object.keys(FighterData).filter(t => t !== player.type);
            const enemyType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
            enemy = new Fighter(enemyType, false, 2);
            
            // Make enemy slightly stronger each round
            enemy.attack *= (1 + Game.session.round * 0.1);
            enemy.maxHealth *= (1 + Game.session.round * 0.1);
            enemy.health = enemy.maxHealth;
            
            // New theme for new round
            PhilosophyGenerator.selectTheme();
            
            // Reset defeat flag
            Game.enemyDefeated = false;
        }
        
        function checkWinCondition() {
            if (!player || !enemy) return;
            
            // Player defeated
            if (player.health <= 0) {
                Game.session.losses++;
                endMatch(false);
                return;
            }
            
            // Enemy defeated (only trigger once)
            if (enemy.health <= 0 && !Game.enemyDefeated) {
                Game.enemyDefeated = true;
                Game.session.wins++;
                Game.session.score += 2000;
                Game.session.xp += 100;
                
                // Show upgrade screen then disciple challenge
                Audio.scheduleOnBeat(() => {
                    UpgradeSystem.open();
                }, 1);
            }
        }
        
        function updateCombo() {
            if (Game.session.comboTimer > 0) {
                Game.session.comboTimer--;
                if (Game.session.comboTimer <= 0) {
                    if (Game.session.combo > Game.session.maxCombo) {
                        Game.session.maxCombo = Game.session.combo;
                    }
                    Game.session.combo = 0;
                }
            }
        }
        
        function mainLoop(currentTime) {
            // Calculate delta time
            const deltaTime = currentTime - Game.lastTime;
            Game.lastTime = currentTime;
            Game.deltaTime = deltaTime;
            Game.frameCount++;
            
            // Clear canvas
            ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // Handle input based on state
            switch (Game.state) {
                case GameState.MENU:
                case GameState.CHARACTER_SELECT:
                    Menus.handleInput();
                    Menus.draw(ctx);
                    break;
                    
                case GameState.FIGHTING:
                    // Update game systems
                    Input.clearFrame();
                    
                    // Apply slow motion if active
                    const timeScale = Game.slowMotion;
                    
                    if (Game.frameCount % Math.ceil(1 / timeScale) === 0) {
                        // Player input
                        player.handleInput();
                        
                        // Update fighters
                        player.update(deltaTime);
                        enemy.update(deltaTime);
                        
                        // Combat checks
                        player.checkAttackHit(enemy);
                        enemy.checkAttackHit(player);
                        
                        // Update systems
                        Items.update();
                        Particles.update();
                        PhilosophyGenerator.update();
                        Notifications.update();
                        updateScreenEffects();
                        updateCombo();
                        
                        // Check win condition
                        checkWinCondition();
                    }
                    
                    // Draw everything
                    ctx.save();
                    ctx.translate(Game.screenShake.x, Game.screenShake.y);
                    
                    Arena.draw(ctx);
                    PhilosophyGenerator.draw(ctx);
                    Items.draw(ctx);
                    enemy.draw(ctx);
                    player.draw(ctx);
                    Particles.draw(ctx);
                    HUD.draw(ctx);
                    Notifications.draw(ctx);
                    
                    ctx.restore();
                    
                    // Screen flash
                    if (Game.flash.active) {
                        ctx.fillStyle = Game.flash.color;
                        ctx.globalAlpha = Game.flash.alpha;
                        ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                        ctx.globalAlpha = 1;
                    }
                    
                    // Update audio
                    Audio.updateMusic(deltaTime);
                    break;
                    
                case GameState.ROUND_START:
                    // Draw arena in background
                    Input.clearFrame();
                    
                    ctx.save();
                    ctx.translate(Game.screenShake.x, Game.screenShake.y);
                    
                    Arena.draw(ctx);
                    player.draw(ctx);
                    enemy.draw(ctx);
                    HUD.draw(ctx);
                    
                    ctx.restore();
                    
                    // Update and draw countdown
                    RoundStart.update();
                    RoundStart.draw(ctx);
                    
                    Audio.updateMusic(deltaTime);
                    break;
                    
                case GameState.DISCIPLE_CHALLENGE:
                    Input.clearFrame();
                    DiscipleChallenge.handleInput();
                    
                    // Draw arena in background
                    Arena.draw(ctx);
                    enemy.draw(ctx);
                    player.draw(ctx);
                    
                    // Draw challenge overlay
                    DiscipleChallenge.draw(ctx);
                    break;
                    
                case GameState.UPGRADE:
                    Input.clearFrame();
                    UpgradeSystem.handleInput();
                    
                    // Draw arena in background
                    Arena.draw(ctx);
                    HUD.draw(ctx);
                    
                    // Draw upgrade overlay
                    UpgradeSystem.draw(ctx);
                    break;
                    
                case GameState.RESULTS:
                    Input.clearFrame();
                    ResultsScreen.handleInput();
                    ResultsScreen.draw(ctx);
                    break;
            }
            
            // Continue loop
            requestAnimationFrame(mainLoop);
        }
        
        // Initialize game
        function init() {
            initCanvas();
            Input.init();
            Audio.init();
            
            // Handle keyboard input for code entry
            window.addEventListener('keydown', (e) => {
                if (Menus.showingCodeInput && e.key.length === 1) {
                    Menus.codeInputText += e.key.toUpperCase();
                }
                if (Menus.showingCodeInput && e.key === 'Backspace') {
                    Menus.codeInputText = Menus.codeInputText.slice(0, -1);
                }
            });
            
            // Start the game loop
            requestAnimationFrame(mainLoop);
        }
        
        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
    })();
    </script>
</body>
</html>
